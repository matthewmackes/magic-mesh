# OBS-3 — MCNF CI.
#
# Enforces the AI_GOVERNANCE §7 Definition-of-Done gates on every push/PR:
# build · test (incl. the async-services worker suite) · clippy --all-targets ·
# fmt --check · the mesh/desktop boundary lint (§6) · the Carbon single-source
# lint (§4) · the substrate-lock lint (§1–§3) · and a hard 80% line-coverage
# floor (Q90/Q93). The crypto + boundary gates are deny-level: a violation
# fails the build, it doesn't warn.
name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # EFF-46 — the nightly schedule drives the `ignored-tests` job below
  # (the #[ignore]d suites that are too slow / host-dependent for the
  # per-push gates). workflow_dispatch allows an on-demand pre-cut run.
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # E0.2 — the vendored Opus tree needs an explicit CMake policy floor; the
  # workspace .cargo/config.toml sets this too, but make it explicit for CI.
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  gates:
    name: build · test · lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The full-workspace debug build (iced + audio + all deps) + test
      # binaries + the rust-cache overflow the free runner's ~14 GB disk
      # (the cache-save post-step failed "No space left on device"). Reclaim
      # the preinstalled SDKs we don't use (~25 GB) up front.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      # The audio chain links ALSA; the iced GUIs link GTK; the vendored Opus
      # build needs CMake. pkg-config resolves them.
      - name: System dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libgtk-3-dev cmake pkg-config protobuf-compiler mold

      - name: Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format (--check)
        run: cargo fmt --all -- --check

      - name: Build (workspace)
        run: cargo build --workspace --locked

      # Everything except mackesd runs PARALLEL (fast — e.g. mde-kdc-host's
      # deliberate sleeps/RSA-4096 keygen tests overlap).
      - name: Test (workspace, excl. mackesd)
        run: cargo test --workspace --exclude mackesd --locked

      # mackesd is run SINGLE-THREADED. Several of its tests mutate
      # process-global env (`std::env::set_var` for MDE_ROLE_PATH /
      # XDG_CACHE_HOME / CREDENTIALS_DIRECTORY) while sibling tests read the
      # environment; under the default parallel harness that set_var/getenv
      # interleaving corrupts glibc's `environ` and the mackesd suite hangs
      # indefinitely. Serially it is correct (verified: 1397 pass,
      # --test-threads=1). `--features async-services` makes this the
      # superset (also compiles + runs the daemon-worker tests). Follow-up
      # (tracked): remove the test set_var hazard so this can go parallel.
      - name: Test (mackesd, serial — env-race safe)
        run: cargo test -p mackesd --features async-services --locked -- --test-threads=1

      # Carbon tokens are the one place a palette/metric change is allowed.
      - name: Carbon token tests (§4)
        run: cargo test -p mde-theme --locked

      - name: Clippy (--all-targets, deny on crypto/unwrap per workspace lints)
        run: cargo clippy --workspace --all-targets --locked

      - name: Mesh/desktop boundary lint (§6)
        run: ./install-helpers/lint-mesh-boundary.sh

      - name: Carbon single-source lint (§4)
        run: ./install-helpers/lint-carbon-tokens.sh

      - name: Motion single-source lint (§4 / MOTION-AUDIT-2)
        run: ./install-helpers/lint-motion.sh

      - name: No-private-D-Bus-name lint (§2)
        run: ./install-helpers/lint-bus-names.sh

      - name: libcosmic single-rev lint (EFF-35 / CUT-5)
        run: ./install-helpers/lint-libcosmic-rev.sh

      - name: No-crates.io-iced lint (CUT-3 — GUI is all-libcosmic)
        run: ./install-helpers/lint-no-cratesio-iced.sh

      # NOTE on §1–§4 deeper checks: the Carbon single-source rule (§4) is
      # enforced by the mde-theme token tests above (a palette/metric value
      # changes only with a backing assertion); the substrate locks (§1–§3)
      # and "shipped-but-dead" reachability are swept by the /audit skill,
      # which is a richer judgement than a blunt grep can make in CI without
      # false-positiving on tests, parse-examples, and computed grays.

  screenshots:
    name: preview gallery (visual artifact)
    runs-on: ubuntu-latest
    # OBS-4 (Q92) — a scripted /preview capture of the Workbench surfaces,
    # uploaded as a build artifact for human visual review. Advisory: the
    # on-session visual-confirmation gate is lifted (2026-06-11), and a flaky
    # headless render must never red master — the job RUNS, captures whatever
    # it can, and always uploads. `continue-on-error` keeps a capture miss
    # off the required-checks path.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      # The iced GUI links GTK; the vendored Opus build needs CMake. sway
      # (headless wlroots) + grim (wlr-screencopy) drive the capture; the
      # software-render path needs no GPU.
      - name: System dev libraries + headless capture stack
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libgtk-3-dev cmake pkg-config protobuf-compiler mold sway grim

      - name: Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@v2

      - name: Build the Workbench
        run: cargo build -p mde-workbench --locked

      - name: Capture the preview gallery
        run: ./install-helpers/preview-gallery.sh "$GITHUB_WORKSPACE/preview-gallery"

      - name: Upload the gallery artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workbench-preview-gallery
          path: preview-gallery/
          if-no-files-found: warn

  coverage:
    name: coverage floor (80%, library logic)
    runs-on: ubuntu-latest
    # EFF-31 — HARD gate (was advisory). The denominator is the
    # **library logic**, which is what line-coverage meaningfully
    # measures here:
    #   * the 7 iced/libcosmic GUI crates are --excluded — their bulk
    #     is `view()` render code whose correctness rests on the
    #     mde-theme Carbon tokens + component tests, not on headless
    #     per-line coverage (the visual-confirmation gate was lifted
    #     2026-06-11);
    #   * the binary ENTRYPOINTS (src/bin/*.rs, src/main.rs) are
    #     --ignore-filename-regex'd — they're CLI-dispatch + daemon
    #     bootstrap glue (mackesd.rs alone is ~5.7k lines of `Cmd::`
    #     arms + run_serve wiring) that needs a live daemon/store/bus,
    #     i.e. integration territory, not unit tests.
    # Measured on this denominator: 84.84% lines (2026-06-12), so the
    # 80 floor has a ~5% margin. Ratchet the floor upward as coverage
    # grows; lowering it needs a deliberate edit, not a silent rot.
    steps:
      - uses: actions/checkout@v4

      # llvm-cov's instrumented full-workspace build is even larger than the
      # plain one — reclaim the preinstalled SDKs we don't use (~25 GB).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      - name: System dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libgtk-3-dev cmake pkg-config protobuf-compiler mold

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Q90/Q93 / EFF-31 — hard 80% line floor over the library-logic
      # denominator (GUI crates excluded, binary entrypoints ignored —
      # see the job comment). async-services on so the worker suites
      # count; mackesd runs --test-threads=1 (its tests mutate process
      # env — EFF-18 — and race under the parallel harness).
      - name: Coverage (--fail-under-lines 80, library logic)
        run: |
          cargo llvm-cov --workspace --locked \
            --features mackesd/async-services \
            --exclude mde-workbench --exclude mde-files --exclude mde-voice-hud \
            --exclude mde-music --exclude mde-iced-components \
            --exclude mde-cosmic-applet --exclude mde-role-chooser \
            --ignore-filename-regex '(/bin/[^/]+\.rs|/main\.rs)$' \
            --fail-under-lines 80 \
            --summary-only \
            -- --test-threads=1

  # EFF-46 — the #[ignore]d suites, exercised on the nightly schedule +
  # on-demand (workflow_dispatch) so they can't rot silently. Two suites
  # exist today:
  #   * throughput_floor (mackes-nebula-https-tunnel) — slow 100 MB
  #     loopback bench; runner-runnable, hard-fails below the 5 Mb/s floor.
  #   * passcode_creds::round_trip_on_real_host (mackesd) — needs
  #     systemd-creds + the host credential key; advisory on shared
  #     runners (continue-on-error), authoritative when an operator
  #     dispatches it on a real host runner.
  ignored-tests:
    name: nightly · ignored suites
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: System dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libgtk-3-dev cmake pkg-config protobuf-compiler mold

      - name: Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@v2

      - name: Throughput floor (NF-1.6, --include-ignored)
        run: |
          cargo test -p mackes-nebula-https-tunnel --locked \
            --test throughput_floor -- --include-ignored

      - name: systemd-creds round trip (advisory on shared runners)
        continue-on-error: true
        run: |
          cargo test -p mackesd --features async-services --locked \
            passcode_creds -- --include-ignored --test-threads=1

  # EFF-16 — supply-chain gates: cargo-deny (advisories · licenses ·
  # bans · sources, config in deny.toml) + a CycloneDX SBOM artifact.
  # HARD gate: the policy was validated green locally (cargo-deny
  # 0.19.8, 2026-06-12) against the full lock — advisories ok, bans ok,
  # licenses ok, sources ok — so a red here is a real regression.
  supply-chain:
    name: supply chain (cargo-deny + SBOM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: cargo-deny (advisories · licenses · bans · sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx

      - name: CycloneDX SBOM
        run: cargo cyclonedx --format json --override-filename magic-mesh-sbom

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: magic-mesh-sbom
          path: "**/magic-mesh-sbom.json"
          if-no-files-found: warn

  # EFF-32 — build/test on the REAL target: Fedora (the RPM platform),
  # with the same dnf dev libs the install docs name, plus nebula +
  # ansible-core present so environment-sensitive tests see the
  # platform binaries. Advisory (continue-on-error) until it has
  # soaked on the runner fleet — the per-push ubuntu gates stay the
  # required check; this job catches Fedora-specific drift (package
  # names, linker, system lib versions).
  #
  # aarch64 remains a noted gap: a faithful build needs an arm64
  # runner or a full cross sysroot for ALSA/GTK — tracked, not faked
  # with a check-only cross job.
  fedora:
    name: fedora-native build · test
    runs-on: ubuntu-latest
    container: fedora:44
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: System dev libraries (dnf)
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ cmake pkg-config git protobuf-compiler mold \
            gtk3-devel alsa-lib-devel openssl-devel \
            rust cargo nebula ansible-core

      - uses: Swatinem/rust-cache@v2

      - name: Build (workspace, Fedora rustc)
        run: cargo build --workspace --locked

      - name: Test (workspace, excl. mackesd)
        run: cargo test --workspace --exclude mackesd --locked

      - name: Test (mackesd, serial)
        run: cargo test -p mackesd --features async-services --locked -- --test-threads=1
