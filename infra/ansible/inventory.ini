# MCNF build farm inventory. Build VMs run the Rust toolchain; the dom0s are
# the XCP hypervisors (key install / capacity checks). Matches the fleet tofu
# declares + farm.sh drives.
[build_vms]
mcnf-build-home-services ansible_host=172.20.0.50 ansible_user=mm   # XEN-HOME-SERVICES (4c/12GiB)
mcnf-build-kvm-xcp1 ansible_host=172.20.0.90 ansible_user=mm        # KVM-XCP1 (4c/12GiB)
mcnf-build-52 ansible_host=172.20.0.130 ansible_user=mm             # XEN-BIGBOY (12c/20GiB)
mcnf-build-xen-194 ansible_host=172.20.0.170 ansible_user=mm        # XEN-194 (4c/11GiB)

[dom0s]
xen-home-services ansible_host=172.20.0.9 ansible_user=root
kvm-xcp1 ansible_host=172.20.145.193 ansible_user=root
xen-bigboy ansible_host=172.20.145.165 ansible_user=root
xen-194 ansible_host=172.20.145.194 ansible_user=root

[all:vars]
ansible_ssh_private_key_file=/root/.ssh/mackes_mesh_ed25519
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new -o ConnectTimeout=15
