# MCNF — the mesh substrate + its Carbon GUIs, on stock Fedora-Cosmic.
#
# Split out of the MackesWorkstation monorepo (the labwc/Win-era MDE desktop,
# now EOL'd) by the E11 "MCNF" pivot: this repo carries only the mesh
# fabric + the iced-0.14 Carbon GUIs that run as apps/applets on Cosmic. The
# desktop chrome (panel/menu/settings/themes/window-mgmt/lock/greeter) is gone —
# Cosmic provides it.
#
# Crates: platform (Bus, role) · mesh (mackesd control plane, Nebula, transport,
# config, types, the magic-fleet Automation Mesh node engine) · services
# (mde-files, voice HUD/config, music) · workbench (the Cosmic control surface) ·
# shared (the Carbon look stack: theme, iced-components, card, disclaimer) ·
# kdc (the canonical KDE Connect host).
#
# EFF-35 — libcosmic git-pin policy. libcosmic has no crates.io release, so
# the three consumers (mde-cosmic-applet, mde-files, mde-role-chooser) pin
# the SAME explicit `rev` (today cca48bc29ef7a9f22160c0ab6ba117ab22d1ae87 —
# the GUI-6 probe rev). Update cadence: bump deliberately, never track a
# branch — re-pin all three in one commit when (a) a Cosmic point release
# lands on the target Fedora spin, or (b) a needed fix/API lands upstream;
# gate the bump on the full workspace build + the GUI crates' tests. Keep
# the revs identical across crates so Cargo resolves one libcosmic tree.

[workspace]
resolver = "2"
members = [
    "crates/platform/mde-bus",
    "crates/platform/mde-role",
    "crates/platform/mde-cosmic-applet",
    "crates/platform/mde-role-chooser",
    "crates/mesh/mackes-config",
    "crates/mesh/mackes-mesh-types",
    "crates/mesh/mackes-nebula-https-tunnel",
    "crates/mesh/mackes-transport",
    "crates/mesh/mackes-xcp",
    "crates/mesh/mackesd",
    "crates/mesh/mde-enroll",
    "crates/mesh/magic-fleet",
    "crates/services/mde-files",
    "crates/services/mde-music",
    "crates/services/mde-musicd",
    "crates/services/mde-notify",
    "crates/services/mde-voice-config",
    "crates/services/mde-voice-hud",
    "crates/workbench/mde-workbench",
    "crates/shared/mde-card",
    "crates/shared/mde-disclaimer",
    "crates/shared/mde-theme",
    "crates/kdc/mde-kdc-host",
    "crates/kdc/mde-kdc-proto",
]

[workspace.package]
version      = "11.0.9"
edition      = "2021"
# EFF-33 — the MSRV floor, enforced by CI (every ci.yml job builds the
# full workspace on pinned 1.85). The dev/build ceiling (1.94, the
# softbuffer cap) lives in rust-toolchain.toml — see its header.
rust-version = "1.85"
license      = "GPL-3.0-or-later"
authors      = ["Matthew Mackes <matthewmackes@gmail.com>"]
repository   = "https://github.com/matthewmackes/magic-mesh"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"

[workspace.lints.rust]
unsafe_code     = "forbid"
missing_docs    = "warn"
unused_must_use = "deny"

[workspace.lints.clippy]
pedantic    = { level = "warn", priority = -1 }
nursery     = { level = "warn", priority = -1 }
unwrap_used = "deny"
panic       = "warn"
todo        = "deny"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true

# Optimize the pure-Rust RSA stack even in dev/test builds. mde-kdc-host's
# RSA-4096 keygen (E11.8 max-crypto, locked at Q23) runs through the `rsa`
# crate + `num-bigint-dig`; unoptimized those make a single keygen take
# minutes in a debug build, which made the keygen + first_pair tests appear to
# hang and could stall `cargo test --workspace` indefinitely. opt-level=3 on
# just these two crates drops a keygen from >120 s to ~4 s while leaving the
# rest of the workspace fast to compile. Verified: the same test passes in
# 3.84 s under the release profile.
[profile.dev.package.rsa]
opt-level = 3

[profile.dev.package.num-bigint-dig]
opt-level = 3
