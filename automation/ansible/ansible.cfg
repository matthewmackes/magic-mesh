# WL-ARCH-001 Phase B — the cloud configure leg (Ansible) config. Wires the
# mesh-derived dynamic inventory + the mde-seal lookup plugin. NO static host
# files (decided-stack #7), NO Ansible Vault (decided-stack #8 — the mde_seal
# lookup is the one secret path). Paths are relative to this dir; run Ansible from
# automation/ansible/ (or set ANSIBLE_CONFIG to this file).
[defaults]
inventory = inventory/mesh.py
roles_path = roles
lookup_plugins = plugins/lookup
host_key_checking = False
retry_files_enabled = False
# The mesh is reached over the Nebula overlay by hostname (mesh DNS).
interpreter_python = auto_silent

[inventory]
# The mesh-derived dynamic inventory is a `script` inventory (inventory/mesh.py).
enable_plugins = script

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
