# MCNF — shared bus spool (SETUP-fix): one bus for the root mackesd
# daemon + the uid-1000 desktop GUIs. Sticky so users only manage their own files.
d /run/mde-bus 1777 root root -
# Shared mesh-storage dir (SUBSTRATE-V2: a plain Syncthing-replicated dir, no
# FUSE) — 0755 so uid-1000 GUIs can traverse into it. setup-syncthing wires the
# full-mesh replication of this dir.
d /mnt/mesh-storage 0755 root root -
