# Magic Mesh — shared bus spool (SETUP-fix): one bus for the root mackesd
# daemon + the uid-1000 desktop GUIs. Sticky so users only manage their own files.
d /run/mde-bus 1777 root root -
# QNM-Shared LizardFS mountpoint — 0755 so uid-1000 GUIs can traverse into the
# allow_other FUSE mount (setup-qnm-shared.sh mfsmounts the volume here).
d /mnt/mesh-storage 0755 root root -
