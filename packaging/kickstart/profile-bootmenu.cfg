# PLANES-21 / W57 — the install ISO's boot-menu profile choice.
#
# One image carries every install profile; the boot menu lets the operator
# pick one at install time by appending `mde.profile=<name>` to the kernel
# cmdline. The kickstart %post (magic-on-cosmic.ks) reads that arg and pins
# the matching role (+ firstboot auto-join when the profile bakes a token).
#
# These are isolinux entries (BIOS). livemedia-creator/lorax also emits a
# GRUB config for UEFI — mirror each entry there as a `menuentry` whose
# `linuxefi` line carries the same `inst.ks=… mde.profile=<name>` args. The
# ISO build (`mackesd images --build --kind iso`) includes this snippet via
# the lorax template so both loaders show the same choices.
#
# `inst.ks=` points at the baked kickstart; `mde.profile=` is the only
# per-entry difference. Default is Workstation (the Cosmic first-run
# chooser still runs if no profile is pinned).

label workstation
  menu label ^Workstation (desktop)
  menu default
  kernel vmlinuz
  append initrd=initrd.img inst.ks=cdrom:/magic-on-cosmic.ks mde.profile=workstation quiet

label server
  menu label ^Server (headless, unattended)
  kernel vmlinuz
  append initrd=initrd.img inst.ks=cdrom:/magic-on-cosmic.ks mde.profile=server quiet

label lighthouse
  menu label ^Lighthouse (always-on hop, unattended)
  kernel vmlinuz
  append initrd=initrd.img inst.ks=cdrom:/magic-on-cosmic.ks mde.profile=lighthouse quiet
