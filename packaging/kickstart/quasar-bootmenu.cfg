# OW-12 — the Magic-on-Construct installer ISO's boot-menu profile choice.
#
# One image carries every install profile; the boot menu lets the operator pick
# one at install time by appending `mde.profile=<name>` (and `mde.headless` for a
# display-less box) to the kernel cmdline. The kickstart %post
# (magic-on-quasar.ks) reads those and pins the matching role (+ firstboot
# auto-join when the profile bakes a token), so every entry installs unattended.
#
# These are isolinux entries (BIOS). The anaconda-iso / lorax build also emits a
# GRUB config for UEFI — mirror each entry there as a `menuentry` whose `linuxefi`
# line carries the same `inst.ks=… mde.profile=<name> [mde.headless]` args.
#
# `inst.ks=` points at the baked Construct kickstart; `mde.profile=`/`mde.headless`
# are the only per-entry differences. Default is the Workstation egui seat.

label workstation
  menu label ^Workstation (egui desktop seat)
  menu default
  kernel vmlinuz
  append initrd=initrd.img inst.ks=cdrom:/magic-on-quasar.ks mde.profile=workstation quiet

label workstation-headless
  menu label Workstation (^headless — no local display)
  kernel vmlinuz
  append initrd=initrd.img inst.ks=cdrom:/magic-on-quasar.ks mde.profile=workstation mde.headless quiet

label server
  menu label ^Server (headless, unattended)
  kernel vmlinuz
  append initrd=initrd.img inst.ks=cdrom:/magic-on-quasar.ks mde.profile=server quiet

label lighthouse
  menu label ^Lighthouse (always-on hop, unattended)
  kernel vmlinuz
  append initrd=initrd.img inst.ks=cdrom:/magic-on-quasar.ks mde.profile=lighthouse quiet
