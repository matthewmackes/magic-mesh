# Magic Mesh drop-in for the stock nebula.service (from the `nebula` RPM):
# auto-restart the overlay on failure and notify if it gives up. The found/join
# verbs + the RPM enable nebula.service so the overlay also comes up at boot
# (the stock unit ships disabled).
[Unit]
OnFailure=mesh-alert@%n.service
StartLimitIntervalSec=300
StartLimitBurst=10

[Service]
Restart=on-failure
RestartSec=3
