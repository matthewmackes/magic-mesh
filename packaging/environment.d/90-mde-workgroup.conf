# Magic Mesh — point the user session (cosmic GUIs: workbench/applet/files/
# voice-hud) at the SHARED QNM-Shared mount the root mackesd daemon uses, so the
# Mesh Storage / Fleet / Network Hosts panels read the same 4-node directory the
# daemon serves. Without this, default_workgroup_root() is HOME-relative and the
# GUI resolves /home/<u>/QNM-Shared while the daemon uses /root/QNM-Shared.
# The volume is mfsmounted here with allow_other (see setup-qnm-shared.sh).
# systemd user manager reads this on session start.
MDE_WORKGROUP_ROOT=/mnt/mesh-storage
