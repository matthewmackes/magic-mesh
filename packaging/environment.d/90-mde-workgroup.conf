# MCNF — point the user session (cosmic GUIs: workbench/applet/files/
# voice-hud) at the SHARED mesh-storage dir the root mackesd daemon uses, so the
# Mesh Storage / Fleet / Network Hosts panels read the same directory the daemon
# serves. Without this, default_workgroup_root() is HOME-relative and the GUI
# resolves /home/<u>/QNM-Shared while the daemon uses /root/QNM-Shared.
# SUBSTRATE-V2: this dir is a plain Syncthing-replicated directory (no FUSE).
# systemd user manager reads this on session start.
MDE_WORKGROUP_ROOT=/mnt/mesh-storage
