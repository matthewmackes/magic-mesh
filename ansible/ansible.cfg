# SETUP-7 — local convergence config. `mackesd converge` runs ansible-playbook
# from /usr/share/mackes/ansible/ so this roles_path resolves the `mackes` role
# referenced by the generated /etc/mackesd/site.yml.
[defaults]
roles_path = /usr/share/mackes/ansible/roles
inventory = localhost,
retry_files_enabled = False
stdout_callback = default
[privilege_escalation]
become = True
become_method = sudo
