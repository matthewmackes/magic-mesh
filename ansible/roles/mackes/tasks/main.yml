# SETUP-7 — the `mackes` convergence role. Idempotently restores the steady
# state captured by magic-setup/mackesd into /etc/mackesd/site.yml: the pinned
# role, the boot-durable service set, and a fail-loud shared-storage assert.
# It mirrors the imperative verbs (found/join/setup-syncthing) for re-apply —
# it never re-enrolls or re-mints CA material (that is the interactive bootstrap).
---
- name: Ensure the MDE state dir exists
  ansible.builtin.file:
    path: /var/lib/mde
    state: directory
    mode: "0755"

- name: Pin the deployment role (role.toml)
  ansible.builtin.copy:
    dest: /var/lib/mde/role.toml
    content: |
      # Managed by the mackes Ansible role (SETUP-7). Pinned by magic-setup.
      role = "{{ mde_role }}"
    mode: "0644"

- name: Ensure the boot-durable service set is enabled and running
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ mde_services }}"
  # A unit absent on this role (e.g. syncthing before it is provisioned)
  # must not fail the whole converge — surface it as a warning instead.
  register: svc_result
  failed_when: false

- name: Report any service that could not be brought up
  ansible.builtin.debug:
    msg: "service {{ item.item }} not converged: {{ item.msg | default('see journal') }}"
  loop: "{{ svc_result.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item is failed or (item.state is defined and item.state != 'started')

- name: Assert the shared-storage dir (the file plane) exists
  # Fail-loud: a converge that "succeeds" against a missing /mnt/mesh-storage
  # would mask a file plane that never came up. SUBSTRATE-V2: this is a plain
  # Syncthing-replicated directory, not a FUSE mount.
  ansible.builtin.stat:
    path: "{{ mde_qnm_path }}"
  register: qnm_dir

- name: Warn when the shared-storage dir is missing
  ansible.builtin.debug:
    msg: >-
      WARNING: {{ mde_qnm_path }} does not exist — the file plane is down
      (the peer directory + CA backup will not federate mesh-wide). Provision it
      with `/usr/libexec/mackesd/setup-syncthing`.
  when: not (qnm_dir.stat.exists and qnm_dir.stat.isdir)
