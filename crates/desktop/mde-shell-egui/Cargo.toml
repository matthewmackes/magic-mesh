[package]
name        = "mde-shell-egui"
description = "MCNF E12 \"Quasar\" — the single egui shell (E12-3). One eframe app on the mde-egui harness: a thin persistent chrome bar (peers · sessions · status + an Expand toggle) over a central view that is either the session EmptyState (collapsed — a real session is a VM texture from mde-vdi, a later unit) or the Workbench five-plane nav (expanded). The skeleton the panels (Workbench/Files/Music/Voice) and the VM session-view plug into."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[[bin]]
name = "mde-shell-egui"
path = "src/main.rs"

[features]
# E12-3 — the DRM/KMS bare-seat backend. Build `mde-shell-egui --features drm` to
# ship the shell that OWNS the seat directly (no compositor, no display manager).
# OFF by default so the workspace build stays portable — the native DRM stack
# (libdrm/gbm/egl/libinput/udev) is pulled only for the shipped shell binary;
# `main.rs` falls back to the windowed eframe client when the feature is off or no
# DRM master is present.
drm = ["mde-egui/drm"]

[dependencies]
# The §4/§5 harness is the shell's primary inward dependency (§6 layered tiers):
# it provides run_client (the eframe Wayland-client runner), the shared Style, the
# Motion table, and re-exports egui/eframe so the shell shares one toolkit
# resolution.
mde-egui = { path = "../../shared/mde-egui" }

# MV-6 — the Fleet plane subscribes to the mackesd virt workers' Bus topics
# (`event/kvm/services` / `event/vm/instances`) and publishes host-targeted
# `action/vm/lifecycle` requests via the persist-first publish path. mde-bus is
# the platform-services tier; the dependency edge points inward (§6).
mde-bus = { path = "../../platform/mde-bus" }

# The Bus payloads are a JSON boundary: the Fleet plane mirrors the worker
# payloads with local serde structs rather than depending on the mackesd daemon
# crate (keeps the shell in the desktop-shell tier).
serde      = { workspace = true }
serde_json = { workspace = true }

# The chrome bar's live Peers + Status fold the world-readable mesh-status
# snapshot, reusing the render-agnostic LIGHTHOUSE-7 model
# (`lighthouse_health_from_snapshot` / `LighthouseHealth`) so the bar's health
# verdict can't diverge from the fleet's. `default-features = false` drops the
# applet's libcosmic panel shell (E12 retires libcosmic) — only the pure logic
# layer compiles in. platform tier; the edge points inward (§6), the same reuse
# the egui panel client (mde-panel-egui) makes.
mde-cosmic-applet = { path = "../../platform/mde-cosmic-applet", default-features = false }

# E12-3b EMBED — the three polished mesh-control surfaces are mounted as in-shell
# panels (Quasar §5: panels in the one shell, not separate clients). Each is a
# desktop-shell-tier lib the shell owns the App of and drives per-frame (pump +
# header + `*_panel`). The dependency edge points sideways-inward within the
# desktop-shell tier (§6) — the same toolkit resolution (`mde-egui`) flows through.
mde-music-egui = { path = "../mde-music-egui" }
mde-files-egui = { path = "../mde-files-egui" }
mde-voice-egui = { path = "../mde-voice-egui" }

# E12-5a — the VDI Desktop surface. These two decoder crates turn a remote RDP /
# VNC framebuffer into an egui `ColorImage` the shell uploads to a `TextureHandle`
# (lock 21, render egui-native — no external viewer). The shell's `vdi` panel is
# their first caller; the edge points sideways-inward within the desktop-shell
# tier (§6), sharing the one `mde-egui` toolkit resolution.
mde-vdi-rdp = { path = "../mde-vdi-rdp" }
mde-vdi-vnc = { path = "../mde-vdi-vnc" }

# E12-7 — the Instances surface. The local cloud-hypervisor VM broker: the shell's
# `instances` panel is its first caller (the reachability fix E12-5a made for the
# VDI crates). It drives mde-kvm's create/boot/shutdown lifecycle over the VM's
# api-socket; the live VMM stays gated behind mde-kvm's own transport seam. The
# edge points inward to the services tier (§6).
mde-kvm = { path = "../../services/mde-kvm" }

# The Notifications surface reuses the `mde-notify` shared model (AlertTail +
# AlertItem + severity classification) so alert rendering stays consistent with
# the standalone notify center. Services tier; the edge points inward (§6).
mde-notify = { path = "../../services/mde-notify" }

[lints]
workspace = true
