# MCNF "Quasar" — `mde-term-egui`: the mesh terminal surface (TERM epic;
# design: `docs/design/mesh-terminal.md`).
#
# A Terminator-class egui-native terminal. This crate opens with the VT ENGINE
# CORE (TERM-1): a mature xterm/VT100 parser (`alacritty_terminal`, §6 — never
# re-implement VT parsing) wrapped behind a render-agnostic screen model — a
# cell grid (fg/bg/attrs per cell) + a soft-capped scrollback ring — that later
# units (the egui pane widget TERM-3, splits/tabs/broadcast, the mackesd PTY
# broker) render and feed. TERM-1 is the headless core only: no egui view yet,
# but a real, buildable workspace member.
#
# Tier (§6): desktop-shell. Its only in-workspace edge points inward to
# `crates/shared/mde-egui` (the harness + the shared Style). The VT engine is
# an external crate.
[package]
name        = "mde-term-egui"
description = "MCNF Quasar — the mesh terminal surface. TERM-1 lands the VT engine core: alacritty_terminal (mature xterm/VT100 parsing, §6 — no re-implemented VT) wrapped behind a render-agnostic screen model (cell grid with fg/bg/attrs + a soft-capped scrollback ring). TERM-2 wires a real local shell to it: the user's $SHELL as a login shell on a fresh PTY (alacritty's own tty layer — typed argv spawn, §9), pump threads both ways, TIOCSWINSZ resize, clean child reap. TERM-3 paints it: an interactive egui widget (batched same-style glyph runs, content palette with true-color pass-through, block cursor, mouse selection + clipboard, scrollback viewport, rect-driven cols/rows) and the runnable surface binary on the mde-egui harness. TERM-4 nests it: Terminator's split model — a pure Leaf|Split binary tree (arbitrary-depth H/V splits, close-collapses, drag-reparent; unit-tested headless) multiplexing one widget per leaf over a session registry, with draggable Style-token dividers, zoom, Alt-drag rearrange, and focus that follows clicks/splits/closes/Alt-arrow navigation."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[lib]
name = "mde_term_egui"
path = "src/lib.rs"

[[bin]]
name = "mde-term-egui"
path = "src/main.rs"

[dependencies]
# The §4/§5 egui harness — `run_client` + the shared `Style` + the re-exported
# `egui`/`eframe` (one toolkit resolution for every surface). The TERM-3 widget
# renders all chrome through `Style`; the ANSI content palette (the documented
# §4 carve-out) lives in this crate's `palette` module.
mde-egui = { path = "../../shared/mde-egui" }
# REUSE (§6): the mature VT/xterm engine. `alacritty_terminal` owns the ANSI
# parser (its bundled `vte`), the cell grid, and the scrollback — the exact
# fidelity the design doc's Q1 lock demands. We consume it headless (no
# alacritty windowing) and expose a simplified cell/grid/scrollback view.
alacritty_terminal = "0.24"
# Dual role. (a) REQUIRED feature unification: `alacritty_terminal`'s
# always-compiled `tty` module pulls `rustix-openpty`, which depends on `rustix`
# with `default-features = false` — so its 0.38 instance omits the `std` feature.
# Nothing else in the graph unifies `std` onto that instance, so `rustix` builds
# in its `no_std` polyfill mode and alacritty's tty code fails to compile
# (`OwnedFd: rustix::fd::AsFd` unsatisfied). Naming `rustix` here with `std`
# unifies the feature back on and the engine compiles. (b) The local-PTY layer
# (TERM-2, `src/pty.rs`) reuses alacritty's `tty` for all PTY/session plumbing
# (§6) and makes exactly one direct rustix call — `fs::fcntl_setfl`, `fs`
# feature — to flip the master fd back to blocking for its pump threads
# (alacritty's `tty::new` force-sets O_NONBLOCK for its own poll loop).
rustix = { version = "0.38", features = ["std", "termios", "pty", "fs"] }

[lints]
workspace = true
