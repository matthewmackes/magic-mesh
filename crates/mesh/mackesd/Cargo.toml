# EFF-14 — install/upgrade/remove scriptlets: register the daemon unit, create
# the config dir, refresh icon/desktop caches; clean up on removal. Guards keep
# them no-fatal in minimal/container roots.
post_install_script = """
# SUBSTRATE-6 LizardFS retirement (one-way): nodes enrolled on the old
# LizardFS plane carry qnm-shared.service (the mfsmount retry loop) + a
# mackesd.service.d/20-qnm.conf ordering drop-in. LizardFS is removed — so on
# every upgrade, stop+mask the stale unit (it can never mount; leaving it
# enabled just crash-loops mfsmount) and drop the ordering files so mackesd is
# gated on etcd, never on a mount. Idempotent; no-ops on a fresh node.
if [ -f /etc/systemd/system/qnm-shared.service ] || [ -f /usr/lib/systemd/system/qnm-shared.service ]; then
  systemctl disable --now qnm-shared.service >/dev/null 2>&1 || :
  systemctl mask qnm-shared.service >/dev/null 2>&1 || :
  rm -f /etc/systemd/system/qnm-shared.service \
        /etc/systemd/system/qnm-shared.service.d/10-xpa8-4-shipped-loop.conf || :
  rmdir /etc/systemd/system/qnm-shared.service.d 2>/dev/null || :
fi
rm -f /etc/systemd/system/mackesd.service.d/20-qnm.conf || :
# REL-2 — early live lighthouses may carry a local watchdog drop-in that
# shortens mackesd stop time to 20s and forces abort-on-timeout. That overrides
# the packaged unit during RPM upgrades, so remove only that stale policy before
# restart/promotion validation. The base unit still owns the live watchdog.
if [ -f /etc/systemd/system/mackesd.service.d/watchdog.conf ] && \
   grep -Eq 'TimeoutStop(FailureMode=abort|USec=20s|Sec=20)' /etc/systemd/system/mackesd.service.d/watchdog.conf; then
  rm -f /etc/systemd/system/mackesd.service.d/watchdog.conf || :
fi
rmdir /etc/systemd/system/mackesd.service.d 2>/dev/null || :
systemctl daemon-reload >/dev/null 2>&1 || :
# Service manager (ONBOARD-9): the daemon, the overlay, and the health
# watchdog all start at boot. nebula.service ships disabled by the stock
# `nebula` RPM — enable it so the overlay is boot-durable independently of
# the mackesd supervisor. (mackesd self-gates on a pinned role, so enabling
# it pre-enrollment is safe — it idles until `found`/`join` pins a role.)
systemctl enable mackesd.service nebula.service mesh-health.timer >/dev/null 2>&1 || :
# MESHSHELL — the mesh-status snapshot timer feeds the bash prompt + greeting
# on every role.
systemctl enable --now mesh-status.timer >/dev/null 2>&1 || :
# WL-FUNC-009 — watch the shell-owned Remote Proofing policy and mesh-status
# snapshot, rendering and applying the managed Sunshine/firewalld lifecycle.
# Missing settings are unmanaged/no-op; explicit disabled settings stop only the
# managed Sunshine path and remove only recorded Magic Mesh firewall rules.
systemctl enable mde-remote-proofing-plan.path >/dev/null 2>&1 || :
# MESHSHELL — fetch the starship prompt binary on first boot (checksum-verified;
# self-skips once /usr/bin/starship exists). All roles.
systemctl enable mesh-shell-setup.service >/dev/null 2>&1 || :
# BUS — fetch the ntfy cross-node notification broker on first boot (not in the
# Fedora repos; self-skips once /usr/bin/ntfy exists). All roles → mesh-wide
# notification distribution.
systemctl enable mesh-broker-setup.service >/dev/null 2>&1 || :
# NETDATA-1 — fetch the netdata live-metrics agent on first boot (not in the
# Fedora repos; self-skips once /opt/netdata/bin/netdata exists). All roles →
# the PD-7 flow map + peer health tiers get live data. The aggregator confines
# the dashboard to loopback + overlay.
systemctl enable mesh-netdata-setup.service >/dev/null 2>&1 || :
# SETUP-6 — first-run console wizard. Self-gates on an unconfigured node
# (ConditionPathExists=!/var/lib/mde/role.toml) + takes tty1 only, so enabling
# it everywhere is safe: a configured node skips it and getty owns tty1.
systemctl enable magic-setup.service >/dev/null 2>&1 || :
# SEAT-BOOT-1 — the DRM shell seat launcher. It is enabled everywhere in the
# base RPM but only starts on role="workstation"; `mackesd onboard
# role-provision` masks it on Lighthouse as a hard-off guard.
# Early Construct live seats may carry a hand-written /etc/systemd/system/mde-shell.service
# from pre-RPM testing. It also starts mde-shell-egui on tty1 and can race the
# packaged, role-gated mde-shell-egui.service. Remove only that known legacy
# launcher; leave any unrelated admin-created mde-shell.service untouched.
if [ -f /etc/systemd/system/mde-shell.service ] && \
   grep -q '/usr/bin/mde-shell-egui' /etc/systemd/system/mde-shell.service; then
  systemctl disable --now mde-shell.service >/dev/null 2>&1 || :
  rm -f /etc/systemd/system/mde-shell.service \
        /etc/systemd/system/graphical.target.wants/mde-shell.service \
        /etc/systemd/system/multi-user.target.wants/mde-shell.service || :
fi
systemctl enable mde-shell-egui.service >/dev/null 2>&1 || :
# SELINUX-1 — policy loading can block in semodule on some fresh
# VM images. Do NOT run it from dnf's %post, even with --no-block: starting the
# oneshots can still race the open RPM transaction. Enable only; policy loading
# is deferred to boot or an explicit post-install retry outside dnf.
systemctl enable magic-mesh-selinux-policy.service >/dev/null 2>&1 || :
# MUSIC-DAEMON-AUTOSTART — enable the mde-musicd USER service for every user so
# the music library has its action/music/* responder in the desktop session
# (the GUI talks to it over the bus). It self-gates on Workstation rank
# (ExecCondition) + only starts where a user session exists, so enabling it
# globally is safe: a headless Server/Lighthouse has no session to start it in.
systemctl --global enable mde-musicd.service >/dev/null 2>&1 || :
# SETUP-fix — materialize the shared bus dir now (no reboot needed).
timeout 60 systemd-tmpfiles --create /usr/lib/tmpfiles.d/magic-mesh.conf >/dev/null 2>&1 || :
[ -d /etc/mackesd ] || install -d -m 0700 /etc/mackesd
timeout 60 gtk-update-icon-cache -q -f /usr/share/icons/hicolor >/dev/null 2>&1 || :
timeout 60 gtk-update-icon-cache -q -f /usr/share/icons/YAMIS >/dev/null 2>&1 || :
set_gtk_icon_theme() {
  file="$1"
  dir="${file%/*}"
  install -d -m 0755 "$dir" >/dev/null 2>&1 || return 0
  if [ ! -f "$file" ]; then
    printf '[Settings]\ngtk-icon-theme-name=YAMIS\n' > "$file" || :
  elif grep -q '^gtk-icon-theme-name=' "$file"; then
    sed -i 's/^gtk-icon-theme-name=.*/gtk-icon-theme-name=YAMIS/' "$file" || :
  elif grep -q '^[[]Settings[]]' "$file"; then
    sed -i '/^[[]Settings[]]/a gtk-icon-theme-name=YAMIS' "$file" || :
  else
    printf '\n[Settings]\ngtk-icon-theme-name=YAMIS\n' >> "$file" || :
  fi
}
set_gtk_icon_theme /etc/gtk-3.0/settings.ini
set_gtk_icon_theme /etc/gtk-4.0/settings.ini
timeout 60 update-desktop-database -q >/dev/null 2>&1 || :
"""
pre_uninstall_script = """
if [ "$1" = 0 ]; then
  systemctl --no-reload disable --now mackesd.service mesh-health.timer >/dev/null 2>&1 || :
fi
"""
post_uninstall_script = """
systemctl daemon-reload >/dev/null 2>&1 || :
# SELINUX-1 — drop the local policy modules on a full removal (not an upgrade).
if [ "$1" = 0 ]; then
  semodule -r magicmesh-base magicmesh-podman magicmesh-libvirt >/dev/null 2>&1 || :
fi
"""

# Runtime deps the platform shells to (D-W1 / §1-§5 substrate).
# EFF-42 — verified: `nebula` IS packaged in stock Fedora (1.10.3 on
# F44), so the hard Requires resolves without our repo.
[package.metadata.generate-rpm.requires]
nebula = "*"
# SUBAUDIT-C1 (2026-06-14) — the network-probe inventory ("Discovered Hosts")
# shells `nmap`; absent, the probe silently writes an empty inventory and the
# panel shows 0 hosts. Hard Require: nmap is small + in the base Fedora repos,
# and the feature is core to the mesh host map.
nmap = "*"
# REL-2 (2026-06-16) — the binaries link libasound.so.2 (the AIR-5 audio chain
# in mde-musicd/mde-voice-hud), so it's an implicit ELF dep. Declare it: a
# headless lighthouse without alsa-lib failed the v10.0.9 install until it was
# added by hand. alsa-lib is small + in the base Fedora repos.
alsa-lib = "*"
# RCLICK-4 (2026-06-19) — the Win+X right-click power menu launches these: btop
# (its "Task Manager", run in cosmic-term) + Midnight Commander (`mc`). Both are
# small + in the base Fedora repos, and the menu entries dead-end without them,
# so hard-Require them.
btop = "*"
mc = "*"
# E12-19 (Construct host controls) — the seat services the compositor-less shell
# owns in-process (mde-seat, design quasar-host-controls.md). With no settings
# daemon these have no other owner, and the shell's Mixer/Bluetooth/Power
# sections + the hotkeys drive them directly, so hard-Require the runtimes:
#   · PipeWire + WirePlumber = the audio graph the DAW mixer reads via pw-dump /
#     drives via wpctl (lock 2); pipewire-alsa keeps the existing ALSA users
#     (mde-musicd, mde-voice-hud) working on the shim, unchanged.
#   · bluez = the BlueZ system service the pairing manager + BT hotkey talk to.
#   · upower = the multi-battery telemetry (internal / UPS / BT-peripheral).
# One RPM serves every role; a headless Lighthouse installs them but the seat
# self-gates (the shell only runs on a Workstation), matching the alsa-lib line.
pipewire = "*"
wireplumber = "*"
pipewire-alsa = "*"
bluez = "*"
upower = "*"
# EDTB-6 — offline spell checking shells `hunspell -a`; the checker also needs
# an installed dictionary before it can classify words. Keep both as hard
# Requires so a fresh Workstation has an offline spell engine for editor prose.
hunspell = "*"
hunspell-en-US = "*"
# DDC/CI external-monitor brightness (lock 13) shells `ddcutil` over i2c-dev;
# i2c-tools carries the i2c-dev tooling/module wiring. A monitor that rejects
# DDC renders an honest "not controllable" state (§7), so these back a real
# feature without ever faking a control.
ddcutil = "*"
i2c-tools = "*"

# E12-23 (Storage plane filesystem depth, docs/design/workbench-storage-plane.md
# lock 6) — the Storage worker's UDisks2 executor + fs-tooling verb layer
# (workers/fs_tools.rs) shells these to actually format/label/resize/encrypt on a
# shipped node; without them a locked format renders an honest FsToolError::
# Unavailable instead of working. Hard-Require the whole matrix (all universal +
# small, in the base Fedora repos):
#   · udisks2       — the D-Bus block-topology backend the worker enumerates over.
#   · e2fsprogs     — ext4 mkfs/e2label/e2fsck/resize2fs (grow online, shrink offline).
#   · xfsprogs      — xfs mkfs.xfs/xfs_admin/xfs_growfs (grow-only; shrink honestly
#                     unsupported).
#   · btrfs-progs   — btrfs mkfs/label/resize + subvolume list/create/delete/snapshot.
#   · exfatprogs    — exfat mkfs.exfat/exfatlabel/fsck.exfat.
#   · dosfstools    — vfat mkfs.vfat/fatlabel/fsck.vfat (the vfat leg of lock 6).
#   · ntfs-3g + ntfsprogs — ntfs mkfs.ntfs/ntfslabel/ntfsresize/ntfsfix.
#   · cryptsetup    — LUKS create/open/close + format-inside-LUKS (one staged op).
#   · parted        — the partition-geometry step of the shrink/move choreography.
#   · qemu-img      — the E12-22 virtual-disk lifecycle (create/resize/snapshot/
#                     convert/clone); provided by the qemu-img package.
udisks2 = "*"
e2fsprogs = "*"
xfsprogs = "*"
btrfs-progs = "*"
exfatprogs = "*"
dosfstools = "*"
ntfs-3g = "*"
ntfsprogs = "*"
cryptsetup = "*"
parted = "*"
qemu-img = "*"

# SURFACE-1 (Microsoft Surface tablet/laptop enablement,
# docs/design/surface-tablet-enablement.md locks 1 + 10) — the `surface-tools`
# runtime bits that resolve from the BASE Fedora repos, so a plain
# `dnf install magic-mesh` on ANY node (Surface or not) pulls them WITHOUT the
# linux-surface channel enabled. Both are inert on non-Surface hardware, matching
# the "one Workstation image, conditionally-relevant, inert off-Surface" doctrine
# (lock 10). The Surface-specific packages that live ONLY in the linux-surface
# repo (iptsd, surface-control) are WEAK deps below — a hard Require on them would
# break a plain-Fedora install that lacks that channel; the bootc image bakes them
# via the linux-surface layer (Containerfile).
#   · fwupd    — the LVFS firmware client the SURFACE-5 firmware panel drives
#                (UEFI / touch-controller / SAM updates). Universal — any node has
#                updatable firmware — and in the base Fedora repos.
#   · libwacom — the pen/tablet device DB (base Fedora). The Surface overlay is
#                `libwacom-surface` from the linux-surface layer, but the base pkg
#                is the safe universal hard Require here; inert without a digitizer.
fwupd = "*"
libwacom = "*"

# EFF-42 — ansible-core is a WEAK dep (Recommends): only the Server-tier
# ansible_pull/job_exec workers shell to it, and they degrade gracefully
# (spawn failure → recoverable error + back-off) when it's absent. A
# Lighthouse VPS or a desktop-only Workstation shouldn't drag in the
# whole ansible stack; `dnf install` still pulls it by default
# (weak deps on), and `--setopt=install_weak_deps=False` opts out.

# BOOTC-COMPLETENESS (2026-07-21, operator: "go full Atomic — add every soft-dep
# + the full virtualization stack as hard RPM Requires so any `dnf install
# magic-mesh` AND the offline bootc compose carry the COMPLETE runtime"). Sourced
# from the runtime-externals audit (every binary the platform Command::new's + lib
# it dlopens + the node-virt.yml virt role). All fedora-resolvable; the two that
# cannot be plain hard Requires stay Containerfile-only: power-profiles-daemon
# (conflicts with tuned → --allowerasing) and the rpmfusion `ffmpeg` codec swap
# (mpv-libs links the crippled ffmpeg-free; real H.264/H.265 needs rpmfusion).
# Deliberately NOT added (audit role-gates): swtpm (SELinux scriptlet stalls a
# lighthouse dnf txn — compute-image only), doctl (not a Fedora package),
# ipmitool/createrepo_c/ovn-central (specialized roles), sway/wl-clipboard (dead
# on the compositor-less DRM seat).
#   Networking: nmstate (nmstatectl, magic-fleet netstate apply), nftables (nft,
#     link_traffic shaping), socat (VM serial/VNC console brokering).
nmstate = "*"
nftables = "*"
socat = "*"
#   Audio/media: the shipped shell is re-linked media-mpv, so it dlopens REAL
#     libmpv (mpv-libs) — without it the Media surface silently ships FakeMpv;
#     pipewire-utils (pw-dump, the F44 split-out the seat mixer reads);
#     pulseaudio-utils (paplay, the notification-bell fallback).
mpv-libs = "*"
pipewire-utils = "*"
pulseaudio-utils = "*"
#   Brightness: brightnessctl (backlight fallback when logind SetBrightness is
#     unavailable). (power-profiles-daemon is Containerfile-only — tuned conflict.)
brightnessctl = "*"
#   Automation/convergence: ansible-runner (the local-apply primitive magic-fleet
#     drives — distinct from the weak ansible-core above).
python3-ansible-runner = "*"
#   Mesh/remote: fuse-sshfs (MeshFS/SFTP mounts), sshpass (non-interactive SSH to
#     routers/DC hosts/vehicle gateway), git-core (the GitOps promote/action worker
#     at runtime), rsync + openssh-clients (mesh transport, promoted weak→hard).
fuse-sshfs = "*"
sshpass = "*"
git-core = "*"
rsync = "*"
openssh-clients = "*"
#   Network stack (promoted weak→hard, code-critical): NetworkManager (nmcli, the
#     onboarding NIC config + connectivity), firewalld (firewall-cmd, the mesh
#     firewall worker).
NetworkManager = "*"
firewalld = "*"
#   Editor/terminal/shell utils: ripgrep (rg, editor find-in-files), tmux (terminal
#     session multiplexing), xdg-utils (xdg-open, external URLs).
ripgrep = "*"
tmux = "*"
xdg-utils = "*"
#   FULL VIRTUALIZATION / VDI HOST STACK (node-virt.yml: "every mesh node carries
#     this"). The base Containerfile cherry-picked libvirt drivers; hard-Require the
#     full libvirt meta so the daemon + all drivers + the virbr0 NAT (dnsmasq) are
#     present, plus the pieces the compute worker actually invokes:
#       libvirt                        — full daemon + all drivers + dnsmasq NAT
#       libvirt-daemon-driver-storage  — the `virsh pool-define-as dir` backend
#       guestfs-tools                  — virt-customize/sysprep/guestfish golden-image ops
#       genisoimage                    — the NoCloud cloud-init seed ISO virt-install --cloud-init needs
#       virtiofsd                      — the virtiofs daemon libvirt launches for the MeshFS share
libvirt = "*"
libvirt-daemon-driver-storage = "*"
guestfs-tools = "*"
genisoimage = "*"
virtiofsd = "*"

[package.metadata.generate-rpm.recommends]
# BROWSER-SPLIT — default Workstation installs still pull the production Browser
# engines, but as a separate public-channel artifact that can be size-gated and
# removed independently from the base desktop.
magic-mesh-browser = "*"
ansible-core = "*"
# KIRON / NOTIF-7 — `mde-shell-egui`'s single notification-sound seam shells
# `canberra-gtk-play` for freedesktop event sounds. Fedora provides that binary
# from libcanberra-gtk3. Keep it weak: a fresh Workstation gets audible
# notifications by default, while an opt-out/minimal install degrades to honest
# silence and a headless server variant does not carry a shell seat.
libcanberra-gtk3 = "*"
# KDC-MESH-6 — paired phones send `kdeconnect.mpris` media transport commands;
# the kdc_host worker maps the allowlisted action set to MPRIS through playerctl.
# Weak for the same reason as libcanberra-gtk3: a Workstation gets media-key
# control by default, while a minimal install degrades honestly and the headless
# server variant stays free of desktop-seat helpers.
playerctl = "*"
# AUD6-6 — the shipped (disabled, operator-enabled per EFF-43)
# kamailio-mde/rtpengine-mde units ExecStart these external binaries;
# without them `systemctl start kamailio-mde` fails silently. Weak deps
# so a default install carries them, opt-out-able like ansible-core.
kamailio = "*"
rtpengine = "*"
# RCLICK-4 — the power menu's "Disk Management (Admin)" launches cosmic-disks;
# weak (may be absent from some repos) so a default install pulls it but its
# absence never blocks the install (the entry just no-ops if missing).
cosmic-disks = "*"
# AUD6-14 / BUG-BROWSER-7 — do not weak-pull the libvirt stack from the base
# RPM. On fresh lighthouse installs it drags swtpm, whose SELinux scriptlet can
# stall the dnf transaction. Server/compute installs keep the weak dep below.
# AUD7-8 (NET-INTROSPECT) — the relay/direct path classifier shells `ssh-keygen`
# (debug-SSH keys) + `ssh` (the loopback `list-hostmap -json` query). Without
# openssh-clients the feature silently degrades to "overlay" (no crash); a weak
# dep so a default install gets real classification, opt-out-able.
openssh-clients = "*"
# SUBAUDIT-C1 (2026-06-14) — workers shell these helpers; absent, the owning
# panel silently degrades to empty. Weak deps so a default install carries them
# (opt-out-able), matching the ansible-core pattern: NetworkManager (Interfaces/
# Wi-Fi via nmcli), firewalld (Firewall via firewall-cmd), podman (Compute
# containers), rsync (mirror sync). systemd-resolved/resolvectl ship with
# systemd.
NetworkManager = "*"
firewalld = "*"
podman = "*"
rsync = "*"
# SURFACE-1 (surface-tablet-enablement.md locks 1 + 10) — the `surface-tools`
# bits that live ONLY in the linux-surface repo (pkg.surfacelinux.com), NOT the
# base Fedora channel; the bootc Workstation image bakes them via the
# linux-surface layer (Containerfile). As RPM deps they're WEAK — exactly like
# cosmic-disks above — so a node with the linux-surface repo enabled pulls them,
# while their absence on a plain-Fedora install never blocks `magic-mesh`. Both
# are inert on non-Surface hardware (iptsd's socket only activates on a real IPTS
# digitizer; surface-control no-ops without a Surface Aggregator device):
#   · iptsd           — the Intel Precise Touch & Stylus daemon (touch + pen) the
#                       SURFACE-3 surface_enable worker activates.
#   · surface-control — the surface-control CLI (SAM perf profile / DTX latch /
#                       dGPU) that same worker drives via typed verbs.
iptsd = "*"
surface-control = "*"
# EFF-42 — upgrade continuity: the pre-pivot package name was `mde-core`
# (the E8-era RPM; see config/daemon.rs's template note). Obsolete it so
# a box carrying the old package upgrades cleanly into `magic-mesh`.
[package.metadata.generate-rpm.obsoletes]
mde-core = "*"

# XPA-6 — the full package and the GUI-less `magic-mesh-server` subpackage own
# the same /usr/bin/mackesd + units, so they must not co-install. dnf treats
# Conflicts symmetrically; declaring it on the full side too makes `dnf swap`
# between roles explicit. (Harmless when the subpackage isn't present.)
[package.metadata.generate-rpm.conflicts]
magic-mesh-server = "*"

# BROWSER-SPLIT — co-installable browser package. This is intentionally NOT a
# role variant like `magic-mesh-server`: default Workstation installs get it via
# the base package's weak dependency, but it can be removed independently when a
# node must keep the desktop without the heavy Browser engines.
[package.metadata.generate-rpm.variants.browser]
name = "magic-mesh-browser"
summary = "MCNF Browser engines — Servo fallback, Chromium/CEF helper, verifier, and browser runtime provisioning"
payload_compress = "xz"
release = "1"
license = "GPL-3.0-or-later AND MPL-2.0"
assets = [
    # BOOKMARKS-9 — the out-of-process, OS-sandboxed Servo browser helper
    # (BOOKMARKS-5). It is its OWN workspace root (Servo drags a conflicting
    # native sqlite link), so the cut scripts build it standalone before this
    # variant is generated.
    { source = "target/release/mde-web-preview",     dest = "/usr/bin/mde-web-preview",     mode = "755" },
    # BROWSER-DD-1 — Chromium/CEF browser helper plus renderer bridge.
    { source = "target/release/mde-web-cef",         dest = "/usr/bin/mde-web-cef",         mode = "755" },
    { source = "target/release/mde-web-cef-renderer", dest = "/usr/libexec/mackesd/mde-web-cef-renderer", mode = "755" },
    # BROWSER-CHROME — shell-equivalent verifier for the CEF tab helper wire.
    { source = "target/release/cef-verify",          dest = "/usr/libexec/mackesd/cef-verify", mode = "755" },
    { source = "install-helpers/browser-verify-engines.sh", dest = "/usr/libexec/mackesd/browser-verify-engines", mode = "755" },
    # BROWSER-DD-1 — pinned Chromium/CEF runtime provisioning. The 311 MB CEF
    # runtime is fetched/verified at first boot, not embedded in this RPM.
    { source = "install-helpers/install-cef-runtime.sh", dest = "/usr/libexec/mackesd/install-cef-runtime", mode = "755" },
    { source = "packaging/browser/cef-linux64-minimal.env", dest = "/usr/share/magic-mesh/browser/cef-linux64-minimal.env", mode = "644" },
    { source = "packaging/systemd/mde-cef-runtime-setup.service", dest = "/usr/lib/systemd/system/mde-cef-runtime-setup.service", mode = "644" },
    # BROWSER-DD-5 — curated WebExtensions templates plus explicit lab smoke fixture.
    { source = "install-helpers/browser-cef-webextension-smoke.sh", dest = "/usr/libexec/mackesd/browser-cef-webextension-smoke", mode = "755" },
    { source = "packaging/browser/webextensions-allowlist.env", dest = "/usr/share/magic-mesh/browser/webextensions-allowlist.env", mode = "644" },
    { source = "packaging/browser/webextensions-smoke.env", dest = "/usr/share/magic-mesh/browser/webextensions-smoke.env", mode = "644" },
    { source = "packaging/browser/smoke-extension/manifest.json", dest = "/usr/share/magic-mesh/browser/smoke-extension/manifest.json", mode = "644" },
    { source = "packaging/browser/smoke-extension/smoke.js", dest = "/usr/share/magic-mesh/browser/smoke-extension/smoke.js", mode = "644" },
    # BROWSER-DD-4 — optional Widevine CDM provisioning contract.
    { source = "install-helpers/install-widevine-cdm.sh", dest = "/usr/libexec/mackesd/install-widevine-cdm", mode = "755" },
    { source = "packaging/browser/widevine-linux64.env", dest = "/usr/share/magic-mesh/browser/widevine-linux64.env", mode = "644" },
    { source = "packaging/systemd/mde-widevine-cdm-setup.service", dest = "/usr/lib/systemd/system/mde-widevine-cdm-setup.service", mode = "644" },
    # BROWSER-DD-11/12 — Browser TTS, STT, and translation command wrappers plus
    # optional model/voice provisioning contracts.
    { source = "install-helpers/browser-read-aloud-tts.sh", dest = "/usr/libexec/mackesd/browser-read-aloud-tts", mode = "755" },
    { source = "install-helpers/browser-voice-command-stt.sh", dest = "/usr/libexec/mackesd/browser-voice-command-stt", mode = "755" },
    { source = "install-helpers/browser-translate.sh", dest = "/usr/libexec/mackesd/browser-translate", mode = "755" },
    { source = "install-helpers/install-browser-tts-voice.sh", dest = "/usr/libexec/mackesd/install-browser-tts-voice", mode = "755" },
    { source = "packaging/browser/browser-read-aloud-voice.env", dest = "/usr/share/magic-mesh/browser/browser-read-aloud-voice.env", mode = "644" },
    { source = "packaging/systemd/mde-browser-tts-voice-setup.service", dest = "/usr/lib/systemd/system/mde-browser-tts-voice-setup.service", mode = "644" },
    { source = "install-helpers/install-browser-stt-model.sh", dest = "/usr/libexec/mackesd/install-browser-stt-model", mode = "755" },
    { source = "packaging/browser/browser-voice-command-stt.env", dest = "/usr/share/magic-mesh/browser/browser-voice-command-stt.env", mode = "644" },
    { source = "packaging/systemd/mde-browser-stt-model-setup.service", dest = "/usr/lib/systemd/system/mde-browser-stt-model-setup.service", mode = "644" },
    { source = "install-helpers/install-browser-translate-model.sh", dest = "/usr/libexec/mackesd/install-browser-translate-model", mode = "755" },
    { source = "packaging/browser/browser-translate.env", dest = "/usr/share/magic-mesh/browser/browser-translate.env", mode = "644" },
    { source = "packaging/systemd/mde-browser-translate-model-setup.service", dest = "/usr/lib/systemd/system/mde-browser-translate-model-setup.service", mode = "644" },
    # Browser helper SELinux domains.
    { source = "packaging/selinux/mde-web-preview.te", dest = "/usr/share/magic-mesh/selinux/mde-web-preview/mde-web-preview.te", mode = "644" },
    { source = "packaging/selinux/mde-web-preview.fc", dest = "/usr/share/magic-mesh/selinux/mde-web-preview/mde-web-preview.fc", mode = "644" },
    { source = "install-helpers/setup-selinux-web-preview.sh", dest = "/usr/libexec/mackesd/setup-selinux-web-preview", mode = "755" },
    { source = "packaging/systemd/mde-web-preview-selinux.service", dest = "/usr/lib/systemd/system/mde-web-preview-selinux.service", mode = "644" },
    { source = "packaging/selinux/mde-web-cef.te", dest = "/usr/share/magic-mesh/selinux/mde-web-cef/mde-web-cef.te", mode = "644" },
    { source = "packaging/selinux/mde-web-cef.fc", dest = "/usr/share/magic-mesh/selinux/mde-web-cef/mde-web-cef.fc", mode = "644" },
    { source = "install-helpers/setup-selinux-web-cef.sh", dest = "/usr/libexec/mackesd/setup-selinux-web-cef", mode = "755" },
    { source = "packaging/systemd/mde-web-cef-selinux.service", dest = "/usr/lib/systemd/system/mde-web-cef-selinux.service", mode = "644" },
    # BOOKMARKS-9 — inspectable ad-filter seed files, same bytes embedded by mde-adblock.
    { source = "crates/services/mde-adblock/seed/*.txt", dest = "/usr/share/magic-mesh/adblock/", mode = "644" },
    { source = "LICENSE", dest = "/usr/share/licenses/magic-mesh-browser/LICENSE", mode = "644" },
    { source = "NOTICE",  dest = "/usr/share/licenses/magic-mesh-browser/NOTICE",  mode = "644" },
]
post_install_script = """
systemctl daemon-reload >/dev/null 2>&1 || :
BROWSER_UNITS="mde-web-preview-selinux.service mde-web-cef-selinux.service mde-cef-runtime-setup.service mde-widevine-cdm-setup.service mde-browser-tts-voice-setup.service mde-browser-stt-model-setup.service mde-browser-translate-model-setup.service"
BROWSER_RETRYABLE_UNITS="mde-widevine-cdm-setup.service mde-browser-tts-voice-setup.service mde-browser-stt-model-setup.service mde-browser-translate-model-setup.service"
systemctl unmask $BROWSER_UNITS >/dev/null 2>&1 || :
systemctl enable $BROWSER_UNITS >/dev/null 2>&1 || :
for unit in $BROWSER_RETRYABLE_UNITS; do
  if [ "$(systemctl show "$unit" -p ExecMainStatus --value 2>/dev/null || :)" = "78" ]; then
    systemctl stop "$unit" >/dev/null 2>&1 || :
  fi
done
systemctl start --no-block $BROWSER_UNITS >/dev/null 2>&1 || :
"""
pre_uninstall_script = """
if [ "$1" = 0 ]; then
  systemctl --no-reload disable --now mde-web-preview-selinux.service mde-web-cef-selinux.service mde-cef-runtime-setup.service mde-widevine-cdm-setup.service mde-browser-tts-voice-setup.service mde-browser-stt-model-setup.service mde-browser-translate-model-setup.service >/dev/null 2>&1 || :
fi
"""
post_uninstall_script = """
systemctl daemon-reload >/dev/null 2>&1 || :
if [ "$1" = 0 ]; then
  semodule -r mde_web_preview mde_web_cef >/dev/null 2>&1 || :
fi
"""

[package.metadata.generate-rpm.variants.browser.requires]
magic-mesh = "*"
# BROWSER-DD-1 — the CEF runtime is distributed as `.tar.bz2`; the installer
# extracts it with `tar -xjf`, which needs the external bzip2 helper on Fedora
# minimal images.
bzip2 = "*"
# BOOKMARKS-9 — Servo dynamically links the system graphics/text stack. The leaf
# soname deps (expat/libpng/zlib for fontconfig/freetype) resolve transitively.
fontconfig = "*"
freetype = "*"
harfbuzz = "*"
mesa-libEGL = "*"
mesa-libGL = "*"
mesa-libGLES = "*"
mesa-libgbm = "*"
mesa-dri-drivers = "*"
mesa-vulkan-drivers = "*"
vulkan-loader = "*"
libxkbcommon = "*"
# Browser SELinux loaders compile .te/.fc policy sources on Enforcing seats.
# Keep the toolchain as a hard Browser dependency so a default Workstation
# Browser install does not silently skip the mde_web_preview_t/mde_web_cef_t
# domains after the loader units start.
selinux-policy-devel = "*"
checkpolicy = "*"

# XPA-6 — the GUI-less `magic-mesh-server` subpackage (a cargo-generate-rpm
# *variant*). Built with `cargo generate-rpm -p crates/mesh/mackesd --variant
# server`; build-rpm-fedora43.sh's `--server` mode compiles ONLY the daemon +
# mesh-substrate crates (mackesd/magic-fleet/mde-enroll/mde-bus — none of which
# pull a GUI toolkit), so a headless build neither gates on the heavy
# GUI-toolkit compile nor ships the shell/files/music/voice-hud/applet
# binaries a Server never runs. cargo-generate-rpm overrides each base
# generate-rpm key with the variant's value (and `auto_req` regenerates the ELF
# `Requires` from the listed assets only, so the GUI's graphics-stack ELF deps
# drop out automatically). The variant `assets` array REPLACES the base list —
# it carries the daemon bins + every systemd unit / install-helper / substrate
# script / doc the headless roles need, minus the desktop GUI surface
# (app/applet binaries, *.desktop launchers + autostart, the Construct hicolor app
# icon, the YAMIS platform icon theme, and the Construct wallpaper/brand imagery).
[package.metadata.generate-rpm.variants.server]
name = "magic-mesh-server"
summary = "MCNF (headless Server) — the mesh daemon, Nebula overlay + etcd/Syncthing substrate, no desktop GUIs"
# A node carries EITHER the full magic-mesh OR magic-mesh-server, never both:
# they install the same /usr/bin/mackesd + units, so let dnf refuse co-install
# and let `dnf swap` move between roles. The full package likewise conflicts
# with this one (declared base-side would force every full install to know
# about the subpackage; the variant carries both directions of the pair).
conflicts = { magic-mesh = "*" }
# The headless asset set: daemon/CLI bins + the full systemd/substrate/shell/
# doc payload, MINUS the GUI app+applet binaries, their .desktop launchers and
# autostart entries, the hicolor icon tree, and the desktop brand imagery.
assets = [
    { source = "target/release/mackesd",            dest = "/usr/bin/mackesd",            mode = "755" },
    { source = "target/release/meshctl",            dest = "/usr/bin/meshctl",            mode = "755" },
    { source = "target/release/magic-fleet",        dest = "/usr/bin/magic-fleet",        mode = "755" },
    # ONBOARD-5 — the Magic enrollment TUI (headless over SSH).
    { source = "target/release/mde-enroll",         dest = "/usr/bin/mde-enroll",         mode = "755" },
    { source = "target/release/magic-setup",        dest = "/usr/bin/magic-setup",        mode = "755" },
    { source = "target/release/mde-bus",            dest = "/usr/bin/mde-bus",            mode = "755" },
    # PKG-3 — the self-gating daemon unit + the health/alert watchdog.
    { source = "packaging/systemd/mackesd.service",   dest = "/usr/lib/systemd/system/mackesd.service",   mode = "644" },
    { source = "packaging/systemd/mackesd.service.d/90-stop-policy.conf", dest = "/usr/lib/systemd/system/mackesd.service.d/90-stop-policy.conf", mode = "644" },
    { source = "packaging/systemd/mesh-health.service",  dest = "/usr/lib/systemd/system/mesh-health.service",  mode = "644" },
    { source = "packaging/systemd/mesh-health.timer",    dest = "/usr/lib/systemd/system/mesh-health.timer",    mode = "644" },
    { source = "packaging/systemd/mesh-alert@.service",  dest = "/usr/lib/systemd/system/mesh-alert@.service",  mode = "644" },
    { source = "packaging/systemd/nebula.service.d/10-mesh-recovery.conf", dest = "/usr/lib/systemd/system/nebula.service.d/10-mesh-recovery.conf", mode = "644" },
    { source = "install-helpers/mesh-health-check.sh",   dest = "/usr/libexec/mackesd/mesh-health-check",       mode = "755" },
    { source = "install-helpers/mesh-alert.sh",          dest = "/usr/libexec/mackesd/mesh-alert",              mode = "755" },
    # SUBSTRATE — the etcd + Syncthing coordination/file substrate.
    { source = "install-helpers/setup-etcd.sh",          dest = "/usr/libexec/mackesd/setup-etcd",              mode = "755" },
    # #13 — the turn-key lighthouse JOIN provisioner (`mackesd lighthouse add`): a
    # droplet that joins the EXISTING mesh as a lighthouse (vs do-lighthouse-up.sh
    # which founds a new mesh). do-lighthouse-join.sh finds its cloud-init template
    # next to itself, so both ship to the same /usr/libexec/mackesd dir.
    { source = "install-helpers/do-lighthouse-join.sh",  dest = "/usr/libexec/mackesd/do-lighthouse-join",      mode = "755" },
    { source = "install-helpers/do-lighthouse-join-cloudinit.sh", dest = "/usr/libexec/mackesd/do-lighthouse-join-cloudinit.sh", mode = "755" },
    { source = "packaging/systemd/etcd.service",         dest = "/etc/systemd/system/etcd.service",             mode = "644" },
    { source = "install-helpers/setup-syncthing.sh",     dest = "/usr/libexec/mackesd/setup-syncthing",         mode = "755" },
    { source = "install-helpers/syncthing-reconcile.sh", dest = "/usr/libexec/mackesd/syncthing-reconcile",     mode = "755" },
    { source = "packaging/systemd/syncthing.service",    dest = "/etc/systemd/system/syncthing.service",        mode = "644" },
    { source = "install-helpers/setup-caddy.sh",         dest = "/usr/libexec/mackesd/setup-caddy",             mode = "755" },
    # MEDIA-pkg — ship the Lighthouse_Media bring-up script so the add-Media flow
    # installs it (was scp'd by hand). It self-installs rclone/podman/fuse3 at run.
    { source = "install-helpers/setup-media-navidrome.sh", dest = "/usr/libexec/mackesd/setup-media-navidrome", mode = "755" },
    # MEDIA-9 — the music upload/rescan helper (was repo/leader-host-only). Ships so
    # `mcnf-music-ingest upload <path>` / `rescan` run on any fleet node.
    { source = "install-helpers/mcnf-music-ingest.sh",     dest = "/usr/libexec/mackesd/mcnf-music-ingest",   mode = "755" },
    { source = "install-helpers/cutover-substrate-v2.sh", dest = "/usr/libexec/mackesd/cutover-substrate-v2",    mode = "755" },
    { source = "install-helpers/verify-boot-recovery.sh", dest = "/usr/libexec/mackesd/verify-boot-recovery",   mode = "755" },
    # SETUP-fix — the shared bus spool (tmpfiles + environment.d).
    { source = "packaging/tmpfiles/magic-mesh.conf",     dest = "/usr/lib/tmpfiles.d/magic-mesh.conf",          mode = "644" },
    { source = "packaging/environment.d/90-mde-bus.conf", dest = "/usr/lib/environment.d/90-mde-bus.conf",       mode = "644" },
    { source = "packaging/environment.d/90-mde-workgroup.conf", dest = "/usr/lib/environment.d/90-mde-workgroup.conf", mode = "644" },
    # EFF-43 / VV-1 — the voice-stack units (disabled; server-side render via
    # `mackesd voice render-config`).
    { source = "packaging/systemd/kamailio-mde.service",  dest = "/usr/lib/systemd/system/kamailio-mde.service",  mode = "644" },
    { source = "packaging/systemd/rtpengine-mde.service", dest = "/usr/lib/systemd/system/rtpengine-mde.service", mode = "644" },
    # DISCLAIMER + license + notices.
    { source = "DISCLAIMER.md",                    dest = "/usr/share/magic-mesh/DISCLAIMER.md", mode = "644" },
    { source = "LICENSE",                          dest = "/usr/share/licenses/magic-mesh-server/LICENSE", mode = "644" },
    { source = "NOTICE",                           dest = "/usr/share/licenses/magic-mesh-server/NOTICE",  mode = "644" },
    # EFF-17 — the dnf upgrade channel + signing key.
    { source = "packaging/repo/magic-mesh.repo",         dest = "/etc/yum.repos.d/magic-mesh.repo",          mode = "644" },
    { source = "packaging/repo/RPM-GPG-KEY-magic-mesh",  dest = "/etc/pki/rpm-gpg/RPM-GPG-KEY-magic-mesh",   mode = "644" },
    { source = "SUPPORT.md",                       dest = "/usr/share/magic-mesh/SUPPORT.md", mode = "644" },
    { source = "ADMIN.md",                         dest = "/usr/share/magic-mesh/ADMIN.md", mode = "644" },
    { source = "docs/help/*.md",                   dest = "/usr/share/mde/help/", mode = "644" },
    # SETUP-7 — the hybrid-Ansible convergence role.
    { source = "ansible/ansible.cfg",              dest = "/usr/share/mackes/ansible/ansible.cfg",      mode = "644" },
    { source = "ansible/roles/mackes/**/*",        dest = "/usr/share/mackes/ansible/roles/mackes/",    mode = "644" },
    # MESHSHELL — the mesh-status snapshot + Carbon prompt/greeting/help (all roles).
    { source = "install-helpers/mesh-status-snapshot.sh", dest = "/usr/libexec/mackesd/mesh-status-snapshot", mode = "755" },
    { source = "packaging/systemd/mesh-status.service", dest = "/usr/lib/systemd/system/mesh-status.service", mode = "644" },
    { source = "packaging/systemd/mesh-status.timer",   dest = "/usr/lib/systemd/system/mesh-status.timer",   mode = "644" },
    { source = "install-helpers/mesh-prompt-nodes.sh", dest = "/usr/libexec/mackesd/mesh-prompt-nodes", mode = "755" },
    { source = "packaging/starship/starship.toml",     dest = "/etc/starship.toml",                       mode = "644" },
    { source = "packaging/profile.d/zz-mde-starship.sh", dest = "/etc/profile.d/zz-mde-starship.sh",      mode = "644" },
    { source = "install-helpers/mesh-install-starship.sh", dest = "/usr/libexec/mackesd/mesh-install-starship", mode = "755" },
    { source = "packaging/systemd/mesh-shell-setup.service", dest = "/usr/lib/systemd/system/mesh-shell-setup.service", mode = "644" },
    { source = "install-helpers/mesh-welcome.py",       dest = "/usr/libexec/mackesd/mesh-welcome",        mode = "755" },
    { source = "packaging/profile.d/zz-mde-welcome.sh", dest = "/etc/profile.d/zz-mde-welcome.sh",         mode = "644" },
    { source = "install-helpers/mesh-help.sh",          dest = "/usr/bin/mesh-help",                       mode = "755" },
    # SETUP-6 — the first-run console wizard (TUI, headless-friendly).
    { source = "packaging/systemd/magic-setup.service", dest = "/usr/lib/systemd/system/magic-setup.service", mode = "644" },
    { source = "packaging/profile.d/zz-mde-setup-motd.sh", dest = "/etc/profile.d/zz-mde-setup-motd.sh",   mode = "644" },
    # BUS / NETDATA — the cross-node ntfy broker + the netdata metrics agent.
    { source = "data/ntfy/server.yml.tmpl",             dest = "/usr/share/mde/ntfy/server.yml.tmpl",      mode = "644" },
    { source = "install-helpers/mesh-install-ntfy.sh",  dest = "/usr/libexec/mackesd/mesh-install-ntfy",   mode = "755" },
    { source = "packaging/systemd/mesh-broker-setup.service", dest = "/usr/lib/systemd/system/mesh-broker-setup.service", mode = "644" },
    { source = "install-helpers/mesh-install-netdata.sh", dest = "/usr/libexec/mackesd/mesh-install-netdata", mode = "755" },
    { source = "packaging/systemd/mesh-netdata-setup.service", dest = "/usr/lib/systemd/system/mesh-netdata-setup.service", mode = "644" },
    # BIRTHRIGHT — the bundled air-gapped first-boot blobs (ntfy + starship).
    { source = "vendor/birthright/ntfy_2.24.0_linux_amd64.tar.gz", dest = "/usr/share/magic-mesh/vendor/ntfy_2.24.0_linux_amd64.tar.gz", mode = "644" },
    { source = "vendor/birthright/starship-x86_64-unknown-linux-musl.tar.gz", dest = "/usr/share/magic-mesh/vendor/starship-x86_64-unknown-linux-musl.tar.gz", mode = "644" },
    # SELINUX-1 — the local SELinux policy modules + installer.
    { source = "install-helpers/selinux/*.cil", dest = "/usr/share/magic-mesh/selinux/", mode = "644" },
    { source = "install-helpers/setup-selinux-policy.sh", dest = "/usr/libexec/mackesd/setup-selinux-policy", mode = "755" },
    # DAR-46 — the backoffice/control-VM plane (the control VM IS a Server-role
    # node, so the headless variant carries the same plane as the base RPM): the
    # orchestrator + phase scripts + secret/state/reconciler/DR helpers + the shared
    # etcd resolver + the control-VM tofu root + the boot convergence unit.
    { source = "automation/backoffice/*",        dest = "/opt/mcnf/automation/backoffice/",    mode = "755" },
    { source = "automation/state-backend/*",      dest = "/opt/mcnf/automation/state-backend/", mode = "755" },
    { source = "automation/secrets/mcnf-secret.sh", dest = "/opt/mcnf/automation/secrets/mcnf-secret.sh", mode = "755" },
    { source = "automation/reconciler/*",         dest = "/opt/mcnf/automation/reconciler/",    mode = "755" },
    { source = "automation/dr/*",                 dest = "/opt/mcnf/automation/dr/",            mode = "755" },
    { source = "automation/forgejo/*",            dest = "/opt/mcnf/automation/forgejo/",       mode = "755" },
    { source = "automation/lib/etcd-endpoints.sh", dest = "/opt/mcnf/automation/lib/etcd-endpoints.sh", mode = "755" },
    { source = "infra/tofu/control-vm/*.tf",      dest = "/opt/mcnf/infra/tofu/control-vm/",    mode = "644" },
    { source = "infra/tofu/control-vm/cloud-init/*", dest = "/opt/mcnf/infra/tofu/control-vm/cloud-init/", mode = "644" },
    { source = "infra/tofu/control-vm/env.sh.example", dest = "/opt/mcnf/infra/tofu/control-vm/env.sh.example", mode = "644" },
    { source = "infra/tofu/control-vm/README.md", dest = "/opt/mcnf/infra/tofu/control-vm/README.md", mode = "644" },
    { source = "packaging/systemd/mcnf-backoffice-up.service",  dest = "/usr/lib/systemd/system/mcnf-backoffice-up.service",  mode = "644" },
    { source = "packaging/systemd/mcnf-backoffice-status.service", dest = "/usr/lib/systemd/system/mcnf-backoffice-status.service", mode = "644" },
    { source = "packaging/systemd/mcnf-backoffice-status.timer",   dest = "/usr/lib/systemd/system/mcnf-backoffice-status.timer",   mode = "644" },
    { source = "packaging/systemd/mcnf-reconciler-bootstrap.service", dest = "/usr/lib/systemd/system/mcnf-reconciler-bootstrap.service", mode = "644" },
    { source = "packaging/systemd/mcnf-farm-reconcile.service", dest = "/usr/lib/systemd/system/mcnf-farm-reconcile.service", mode = "644" },
    { source = "packaging/systemd/mcnf-farm-reconcile.timer",   dest = "/usr/lib/systemd/system/mcnf-farm-reconcile.timer",   mode = "644" },
    { source = "packaging/systemd/mcnf-farm-autoscale-reconcile.service", dest = "/usr/lib/systemd/system/mcnf-farm-autoscale-reconcile.service", mode = "644" },
    { source = "packaging/systemd/mcnf-farm-autoscale-reconcile.timer",   dest = "/usr/lib/systemd/system/mcnf-farm-autoscale-reconcile.timer",   mode = "644" },
    { source = "packaging/systemd/mcnf-dr-backup.service", dest = "/usr/lib/systemd/system/mcnf-dr-backup.service", mode = "644" },
    { source = "packaging/systemd/mcnf-dr-backup.timer",   dest = "/usr/lib/systemd/system/mcnf-dr-backup.timer",   mode = "644" },
]

# XPA-6 — the headless variant's hard runtime deps: the same mesh substrate the
# base RPM Requires (nebula overlay, nmap for the host probe, alsa-lib for the
# audio-linked bins), but WITHOUT the desktop-only btop/mc (RCLICK power-menu
# launchers — a headless Server has no right-click menu).
[package.metadata.generate-rpm.variants.server.requires]
nebula = "*"
nmap = "*"
alsa-lib = "*"
# E12-23 — the storage worker is universal (any node has disks), and a Server
# hosts compute, so the headless variant carries the same fs-tooling matrix as the
# base (lock 6). See the base requires block for the per-tool rationale.
udisks2 = "*"
e2fsprogs = "*"
xfsprogs = "*"
btrfs-progs = "*"
exfatprogs = "*"
dosfstools = "*"
ntfs-3g = "*"
ntfsprogs = "*"
cryptsetup = "*"
parted = "*"
qemu-img = "*"

# XPA-6 — the headless variant's weak deps: the Server-tier shell-outs only.
# Dropped vs the base: the desktop-only cosmic-disks, the voice binaries
# (kamailio/rtpengine stay operator-enabled and aren't on a default Server), and
# the libvirt GUI stack stays since a Server hosts compute.
[package.metadata.generate-rpm.variants.server.recommends]
ansible-core = "*"
libvirt-daemon-driver-qemu = "*"
libvirt-daemon-config-network = "*"
openssh-clients = "*"
NetworkManager = "*"
firewalld = "*"
podman = "*"
rsync = "*"

# XPA-6 — upgrade/obsolete continuity for the headless variant (matches the base).
[package.metadata.generate-rpm.variants.server.obsoletes]
mde-core = "*"
