# Phase 12 — Enterprise Mesh Backend & GUI control plane.
#
# Ships TWO targets from one crate:
#
#   * Library `mackesd_core` — the authoritative read API. Linked
#     directly into `mackes-panel` so the GUI gets in-process access
#     to mesh state with zero IPC overhead. No networked API by Phase
#     12.A.3 lock.
#
#   * Binary  `mackesd`      — the reconcile loop + CLI. Runs on every
#     peer as a systemd unit; one is leader per the QNM-Shared lockfile
#     (12.A.5). Owns writes to the SQLite store.
#
# Both consume the same internal modules (store, policy, topology,
# telemetry, reconcile, deploy, audit) — they're not separate crates,
# just separate entry points.

[package]
name         = "mackesd"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
description  = "MCNF control plane — the no-fixed-center workgroup mesh daemon (Nebula overlay, LizardFS storage, fleet reconcile, CA)"

[lib]
name = "mackesd_core"
path = "src/lib.rs"

[[bin]]
name = "mackesd"
path = "src/bin/mackesd.rs"

# ENT-15 — the operator facade. A thin friendly binary over mackesd's
# lifecycle subcommands + the replicated stores (no async-services needed).
[[bin]]
name = "meshctl"
path = "src/bin/meshctl.rs"

[dependencies]
mackes-mesh-types = { path = "../mackes-mesh-types" }
magic-fleet = { path = "../magic-fleet" }
# NF-1 (v2.5) — covert TCP/443 transport. mackesd consumes the
# activation state machine + framing + rustls listener/dialer
# from the new crate; `https_fallback.rs` re-exports the
# activation types as type aliases so the eventual NF-4.5
# deletion is a one-liner rather than a workspace-wide
# refactor.
mackes-nebula-https-tunnel = { path = "../mackes-nebula-https-tunnel" }

# Phase 13 → v2.1+ KDC2 supersession: the legacy mackes-kdc
# crate + kdc_bridge worker have been retired in favour of the
# native mde-kdc + mde-kdc-proto in-process integration
# (KDC2-6.5 / KDC2-6.6). No mackes-kdc dependency remains.


# KDC2-1 (v2.1, locked 2026-05-22) — Transport trait + capability
# model. Consumed by `crates/mackesd/src/topology/mod.rs` to bridge
# `TransportKind` → `EdgeKind`, and by the future mesh_router
# worker (KDC2-3). Implementations live elsewhere (mde-kdc,
# mackes-https-tunnel, mackesd::transport::direct_udp).
mackes-transport = { path = "../mackes-transport" }

# KDC2-3.10 — the canonical host integration crate consumed by the
# kdc_host worker under async-services (E2.2, 2026-06-05: converged
# off the retired legacy `mde-kdc`; one host across the monorepo).
# Provides `pairing::{PairingStore,DeviceRecord}` + the LAN transport;
# pulls in mde-kdc-proto + rsa + pkcs8 transitively, so it's behind
# the same feature gate that already gates tokio + zbus.
mde-kdc-host = { path = "../../kdc/mde-kdc-host", optional = true }

# The canonical pure protocol crate (E2.2 — replaced the renamed
# `mde-kdc-proto-legacy`): `wire::Packet` for the kdc_host worker's
# outbound queue + `dispatch::PluginAuthority` implemented by
# `transport::policy::LoadedPolicy`. No feature gate — these are pure
# types, no I/O or async runtime needed in the base build.
mde-kdc-proto = { path = "../../kdc/mde-kdc-proto" }

# EPIC-MESH-PROBE (MESH-PROBE-2) — the probe inventory IS mde-card
# Cards (Q7): the nmap parser emits Host cards with Service children
# via `mde_card::probe`. Pure lib (serde + sha2), no feature gate.
mde-card = { path = "../../shared/mde-card" }
# SWAY-4 (v6.0 Q89/Q94) — marks_state worker uses Persist + rpc::reply_topic
# to serve action/marks/* Bus action topics. Optional (async-services gate).
mde-bus = { path = "../../platform/mde-bus", optional = true }
# NOTIFY-DIST-2 — the alert-mirror worker reuses the alert-lane predicate +
# shared-dir mirror helpers (async-services gate, with mde-bus).
mde-notify = { path = "../../services/mde-notify", optional = true }
# E1.2 — role-gated worker subsets: run_serve gates each worker spawn by the
# pinned deployment role (mde_role::load → rank). Non-optional + zero-dep, so
# the gating logic is available regardless of feature set.
mde-role = { path = "../../platform/mde-role" }

# VV-1 / VV-1.5 (v4.1.0) — pure-function config generator for
# the kamailio-mde + rtpengine-mde stack. Consumed by the
# `mackesd voice render-config` CLI which both unit files invoke
# as ExecStartPre. No feature gate — the generator is pure and
# adds no runtime cost.
mde-voice-config = { path = "../../services/mde-voice-config" }

# Storage: SQLite via rusqlite (sync, no async runtime needed for the
# reconcile loop's cadence). WAL mode + 5 s busy timeout per 12.A.2.
rusqlite = { version = "0.32", features = ["bundled"] }

# CLI parsing: clap derive macro for declarative subcommand routing.
clap = { version = "4.5", features = ["derive", "env"] }

# JSON for revisions + events + QNM-Shared heartbeat files. Serde
# everything; explicit (de)serializers per type.
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"

# EPIC-MESH-PROBE (MESH-PROBE-2) — read-only DOM parser for nmap's
# `-oX` output. Already vendored in the workspace lockfile; the
# nested host/ports/port/service attribute tree wants a real XML
# parser rather than the substring approach gluster_worker uses for
# its flat `--xml`.
roxmltree   = "0.20"

# KDC2-1.11 — TOML parser for /etc/mde/connect/policy.toml +
# operator override at ~/.config/mde/connect/policy.toml.
# default-features = false because we don't need TOML's
# date / preserve_order features here.
toml = { version = "0.8", default-features = false, features = ["parse", "display"] }

# Time: chrono for ISO-8601 timestamps stored in SQLite TEXT columns.
chrono = { version = "0.4", features = ["serde"] }

# Crypto: SHA-256 for the audit-log hash chain + 16-char URL-safe
# passcode generation.
sha2 = "0.10"
rand = "0.8"

# ONBOARD-2 — self-signed TLS identity for the lighthouse `/enroll`
# HTTPS endpoint (its SHA-256 fingerprint is pinned into every minted
# join token). Pure Rust, same version the Https443 loopback test +
# the KDC keygen path already use. Non-optional so the cert-gen helper
# compiles in every build/test config.
rcgen = "0.13"

# NF-18.1 (v2.5) — passphrase-encrypted CA bundle export/import.
# Argon2id KDF + ChaCha20-Poly1305 AEAD. Best-choice picks per
# the iteration skill standing authorizations (2026-05-24):
# RustCrypto crates are widely audited, no_std-friendly, and
# don't pull in a system libsodium dep. Bundle format is
# versioned so future swaps (e.g. to AES-GCM) ship as a new
# variant without breaking old backups.
argon2 = "0.5"
chacha20poly1305 = "0.10"
# Base64 for the on-disk bundle envelope (ASCII-armored so
# operators can sneakernet via copy/paste).
base64 = "0.22"

# Phase 12.10.4 — zero-on-drop for bearer tokens + passcodes.
zeroize = { version = "1.7", features = ["zeroize_derive"] }

# Phase 12.3.2 — per-node Ed25519 identity (signed enrollment + audit
# row signing).
ed25519-dalek = { version = "2", features = ["rand_core"] }

# Filesystem locking for the leader-election lockfile (12.A.5).
fs2 = "0.4"

# NF-2.4 seal — safe running-uid lookup (rustix avoids the
# `unsafe { libc::getuid() }` path that the workspace's
# `unsafe_code = "forbid"` lint rejects).
rustix = { version = "0.38", features = ["process"] }

# NF-2 CA module — error-derive macro used across the
# ca::{mint,sign,seal,bundle} modules. tokio-rustls already
# pulls thiserror transitively; declaring it here makes the
# direct usage explicit.
thiserror = "1"

# Error context. We surface failures as structured errors, never
# unwrap. anyhow is the canonical Rust ergonomic-error crate.
anyhow = "1"

# Structured logging. tracing macros emit JSON spans; the binary
# initializes a subscriber that writes to stderr in dev and the
# journal in prod.
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Directory resolution that honors $XDG_*_HOME with sensible fallbacks.
dirs = "5"

# Phase 12.5 — SIGTERM/SIGINT handling for `mackesd reconcile`. Used
# only by the binary; the library never installs signal handlers.
# Pinned to the same major as the published 0.3.x line so the build
# stays reproducible across the workspace.
signal-hook = { version = "0.4", features = ["iterator"] }

# --- v2.0.0 Phase A — async surface for in-process worker pool + DBus ---
#
# These three deps are gated behind the `async-services` feature so the
# existing sync code (rusqlite store, reconcile loop on std::thread,
# leader lockfile via fs2) builds untouched on a fresh checkout. The
# binary at src/bin/mackesd.rs enables the feature when it spawns the
# tokio runtime + supervisor + zbus servers; library consumers (the
# mackes-panel link target) can ignore it.

# Async runtime — full features (rt-multi-thread + macros + signal +
# fs + net + io-util + sync + time) for the new worker pool. Locked
# 2026-05-19.
tokio = { version = "1", features = ["full"], optional = true }

# Erlang-style worker supervisor: restart back-off, periodic health
# checks via tick(), runtime add/remove through SupervisorHandle.
# v0.4 chosen per the 2026 stack survey 2026-05-19.
task-supervisor = { version = "0.4", optional = true }

# DBus session-bus services for org.mackes.{Shell,Settings,
# Notifications,Session,Fleet}. tokio feature so the zbus runtime
# cooperates with the worker pool; default-features disabled to skip
# the async-io thread launches. blocking-api stays off — the library
# never blocks.
zbus = { version = "5", default-features = false, features = ["tokio"], optional = true }

# v2.0.0 Phase A — async-trait for object-safe `Worker` boxing in the
# in-process supervisor (`crate::workers::Worker`). Native async-fn-
# in-trait is stable on 1.75+ but isn't object-safe for `Box<dyn>`
# storage, which the supervisor needs. Locked 2026-05-19.
async-trait = { version = "0.1", optional = true }

# MESH-MDNS-RELAY (2026-06-05) — native cross-segment mDNS service relay.
# `mdns-sd` is async-runtime-agnostic (spawns its own daemon thread) so it
# cohabits with the worker without a dedicated executor; it does BOTH the
# local browse and the LAN republish (registering peers' services), replacing
# the v1.x avahi-browse + avahi-publish-service. (Re-added: RETIRE-PY.1 dropped
# it when the dead python mdns worker retired; this is the real consumer.)
mdns-sd = { version = "0.11", optional = true }

# Phase 12.18 D.2 — Https443 transport. rustls 0.23 + tokio-rustls
# 0.26 match the workspace's existing TLS stack (mde-kdc uses
# the same versions). rustls-native-certs loads the system root
# CA store so the fallback host's LE-signed cert chain validates
# against the operator's distro trust bundle (Fedora ships
# `ca-certificates`, the system store rustls-native-certs reads).
# Locked 2026-05-23 — Q10 "indistinguishable from real HTTPS".
rustls = { version = "0.23", default-features = false, features = ["ring", "std"], optional = true }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring"], optional = true }
rustls-native-certs = { version = "0.8", optional = true }

# `futures-util` — `StreamExt`/`TryStreamExt` adapters used by the async
# worker bodies (event-stream `.next()`, `try_join`, etc.).
futures-util = { version = "0.3", optional = true }

[dev-dependencies]
# Deterministic snapshot diffs for library-contract tests (12.11.5).
insta    = { version = "1", features = ["json", "redactions"] }
tempfile = "3"
# (rcgen moved to [dependencies] — ONBOARD-2 needs it at runtime for
# the `/enroll` endpoint's self-signed identity, not just in tests.)

[features]
# MCNF (E11.12 split): mackesd here is the daemon, and the only consumer
# is the `mackesd` binary itself — there is no sync-read-only library consumer
# left (the desktop `mde-session` that used to enable this via feature
# unification was deleted in the cutover). So `async-services` (the worker pool +
# Bus surface the daemon needs) is on by default; the bin no longer relies on
# another crate to turn it on.
default = ["async-services"]

# OBS-1 — opt-in E2E suite that drives real nebula-overlay containers via
# `sudo podman` (see tests/integration_testcontainers.rs). Run with
# `cargo test -p mackesd --features docker-tests -- --test-threads=1`. Tests
# self-skip when root podman + /dev/net/tun aren't available, so the feature is
# safe to enable without forcing every developer to have a root container
# runtime. No extra crate dep — the suite shells podman directly.
docker-tests = []

# XOrg fork — compile mackesd with X11 session plumbing (i3 / xrandr).
# Used by the `mde-xorg` RPM sub-package build.
x11 = []

# v2.0.0 Phase A — opt-in async worker pool + DBus surface. Enabled by
# `cargo build --features async-services` and by `mackesd serve` in
# the binary. The library's `workers/`, `ipc/`, and `settings/`
# modules compile only with this feature; downstream library
# consumers that just want the existing sync read-API can leave it
# off. Locked 2026-05-19.
async-services = [
    "dep:tokio",
    "dep:task-supervisor",
    "dep:zbus",
    "dep:async-trait",
    "dep:mdns-sd",
    "dep:mde-kdc-host",
    "dep:rustls",
    "dep:tokio-rustls",
    "dep:rustls-native-certs",
    "dep:futures-util",
    "dep:mde-bus",
    "dep:mde-notify",
]

[package.metadata.docs.rs]
# Skip the docker-tests feature on docs.rs — it pulls a network
# dependency tree that adds build time without exposing public API.
no-default-features = true

[lints]
workspace = true

# PKG-1/3/6 (W71/72/75/76/86) — the ONE monolithic MCNF RPM.
# `cargo generate-rpm -p mackesd` (operator-gated via /release) packages
# all app/daemon binaries (incl. the ENT-15 meshctl facade) + the
# packaging/ assets into a single
# `magic-mesh` RPM; the install-time role chooser (PKG-5) + the
# self-gating mackesd.service (PKG-3) decide what actually runs per node,
# so there is no per-role package split (§5: Lighthouse ⊂ Server ⊂
# Workstation, one artifact). RPM GPG signing + the ISO stay operator-gated.
[package.metadata.generate-rpm]
name = "magic-mesh"
# EFF-40 — the NEVRA release field: bump THIS (not the workspace
# version) for asset-only/packaging-only changes so `dnf upgrade`
# sees a newer NEVRA; reset to "1" on every workspace version bump.
release = "1"
summary = "MCNF — secure no-fixed-center workgroup mesh + native-Rust Carbon GUIs on Fedora-Cosmic"
# EFF-13 — matches the workspace license (GPL-3.0-or-later). Bundled deps add
# MPL-2.0 (libcosmic/iced stack) + permissive (MIT/Apache-2.0/BSD); see NOTICE.
license = "GPL-3.0-or-later AND MPL-2.0"
# Every binary the workspace builds, placed under /usr/bin.
assets = [
    { source = "target/release/mackesd",            dest = "/usr/bin/mackesd",            mode = "755" },
    { source = "target/release/meshctl",            dest = "/usr/bin/meshctl",            mode = "755" },
    { source = "target/release/magic-fleet",        dest = "/usr/bin/magic-fleet",        mode = "755" },
    # ONBOARD-5 — the Magic enrollment TUI (`mackesd join` with no token
    # launches it; runs headless over SSH).
    { source = "target/release/mde-enroll",         dest = "/usr/bin/mde-enroll",         mode = "755" },
    { source = "target/release/magic-setup",        dest = "/usr/bin/magic-setup",        mode = "755" },
    { source = "target/release/mde-bus",            dest = "/usr/bin/mde-bus",            mode = "755" },
    { source = "target/release/mde-files",          dest = "/usr/bin/mde-files",          mode = "755" },
    { source = "target/release/mde-workbench",      dest = "/usr/bin/mde-workbench",      mode = "755" },
    # PD-10 — the live-map layer-shell wallpaper. Auto-discovered bin target
    # (mde-workbench src/bin/mde-mesh-wallpaper.rs); verified building
    # 2026-06-12 (AUD2-7 cleared as a false positive).
    { source = "target/release/mde-mesh-wallpaper", dest = "/usr/bin/mde-mesh-wallpaper", mode = "755" },
    # NOTIFY-3 — the MDE-Notification-Hub center (layer-shell slide-out).
    # Auto-discovered bin (mde-workbench src/bin/mde-notify-center.rs); launched
    # on demand (app launcher + the applet bell, NOTIFY-7), not autostarted.
    { source = "target/release/mde-notify-center",  dest = "/usr/bin/mde-notify-center",  mode = "755" },
    # NotifyCenter.desktop ships via the packaging/applications/*.desktop glob below.
    # NOTIFY-4 — the transient toast layer (mde-workbench src/bin/mde-notify-toast.rs).
    # Autostarted (Workstation-rank gated) via packaging/autostart/*.desktop glob.
    { source = "target/release/mde-notify-toast",   dest = "/usr/bin/mde-notify-toast",   mode = "755" },
    # NOTIFY-SRC-2 — session-bus monitor that captures desktop-app (Firefox etc.)
    # notifications into the bus fdo/* lane. Autostarted (Workstation-rank gated).
    { source = "target/release/mde-notify-capture", dest = "/usr/bin/mde-notify-capture", mode = "755" },
    { source = "target/release/mde-voice-hud",      dest = "/usr/bin/mde-voice-hud",      mode = "755" },
    { source = "target/release/mde-music",          dest = "/usr/bin/mde-music",          mode = "755" },
    { source = "target/release/mde-musicd",         dest = "/usr/bin/mde-musicd",         mode = "755" },
    # AUD-4 — the §5 Cosmic integration: the mesh-health cosmic-applet binary +
    # its X-CosmicApplet .desktop so cosmic-panel discovers + hosts it.
    { source = "target/release/mde-cosmic-applet",  dest = "/usr/bin/mde-cosmic-applet",  mode = "755" },
    # APPS-9 — the Applications Panel launcher applet; the baked layout lists
    # com.mackes.MagicMeshApps in the panel/dock in place of Cosmic's app-library.
    { source = "target/release/mde-apps-applet",    dest = "/usr/bin/mde-apps-applet",    mode = "755" },
    # AUD-6 / PKG-5 — the first-run deployment-role chooser GUI (autostart below).
    { source = "target/release/mde-role-chooser",   dest = "/usr/bin/mde-role-chooser",   mode = "755" },
    # PKG-3 — the self-gating daemon unit + the role-gated app units.
    { source = "packaging/systemd/mackesd.service",   dest = "/usr/lib/systemd/system/mackesd.service",   mode = "644" },
    # ONBOARD-9 — the service manager: a health watchdog (recovery) + a
    # failure-notification handler. mesh-health.timer drives the watchdog;
    # mesh-alert@.service is fired by OnFailure= on mackesd/nebula; the
    # nebula drop-in adds Restart=on-failure + boot-enable to the stock unit.
    { source = "packaging/systemd/mesh-health.service",  dest = "/usr/lib/systemd/system/mesh-health.service",  mode = "644" },
    { source = "packaging/systemd/mesh-health.timer",    dest = "/usr/lib/systemd/system/mesh-health.timer",    mode = "644" },
    { source = "packaging/systemd/mesh-alert@.service",  dest = "/usr/lib/systemd/system/mesh-alert@.service",  mode = "644" },
    { source = "packaging/systemd/nebula.service.d/10-mesh-recovery.conf", dest = "/usr/lib/systemd/system/nebula.service.d/10-mesh-recovery.conf", mode = "644" },
    { source = "install-helpers/mesh-health-check.sh",   dest = "/usr/libexec/mackesd/mesh-health-check",       mode = "755" },
    { source = "install-helpers/mesh-alert.sh",          dest = "/usr/libexec/mackesd/mesh-alert",              mode = "755" },
    # ONBOARD-6 — QNM-Shared (LizardFS) setup: stands up the replicated
    # shared-state volume over the overlay, boot-durable. Run per-node with
    # --master/--chunkserver/--client (see the script header).
    { source = "install-helpers/setup-qnm-shared.sh",    dest = "/usr/libexec/mackesd/setup-qnm-shared",        mode = "755" },
    # BOOT-REC-4 — the reboot-recovery verification gate (run after a reboot).
    { source = "install-helpers/verify-boot-recovery.sh", dest = "/usr/libexec/mackesd/verify-boot-recovery",   mode = "755" },
    # SETUP-fix — SHARED bus spool so the root mackesd daemon + the uid-1000
    # desktop GUIs share one bus (tmpfiles makes the sticky dir; environment.d
    # gives the user session the same MDE_BUS_ROOT the unit sets).
    { source = "packaging/tmpfiles/magic-mesh.conf",     dest = "/usr/lib/tmpfiles.d/magic-mesh.conf",          mode = "644" },
    { source = "packaging/environment.d/90-mde-bus.conf", dest = "/usr/lib/environment.d/90-mde-bus.conf",       mode = "644" },
    # Same split-brain fix for the QNM-Shared mount: the user session gets the
    # MDE_WORKGROUP_ROOT the unit sets, so GUI panels read the daemon's mount.
    { source = "packaging/environment.d/90-mde-workgroup.conf", dest = "/usr/lib/environment.d/90-mde-workgroup.conf", mode = "644" },
    { source = "packaging/systemd/mde-musicd.service", dest = "/usr/lib/systemd/user/mde-musicd.service", mode = "644" },
    # EFF-43 / VV-1 — the voice-stack units, shipped DISABLED (the
    # operator/fleet policy enables them; ExecStartPre regenerates the
    # config set via `mackesd voice render-config`).
    { source = "packaging/systemd/kamailio-mde.service",  dest = "/usr/lib/systemd/system/kamailio-mde.service",  mode = "644" },
    { source = "packaging/systemd/rtpengine-mde.service", dest = "/usr/lib/systemd/system/rtpengine-mde.service", mode = "644" },
    # App launchers + the SVC-4 voice-agent autostart.
    { source = "packaging/applications/*.desktop", dest = "/usr/share/applications/",      mode = "644" },
    { source = "packaging/autostart/*.desktop",    dest = "/etc/xdg/autostart/",           mode = "644" },
    # Brand: the MCNF hicolor icon set + the DISCLAIMER the gate checks.
    { source = "assets/icons/hicolor/**/*",        dest = "/usr/share/icons/hicolor/",     mode = "644" },
    # AUD2-4 — the swappable brand pack (mde_theme::Brand's system layer;
    # binaries fall back to the baked copies if absent).
    { source = "assets/brand/baked/*",             dest = "/usr/share/mde/brand/",         mode = "644" },
    { source = "DISCLAIMER.md",                    dest = "/usr/share/magic-mesh/DISCLAIMER.md", mode = "644" },
    # EFF-13 — license + third-party notices ship with the package.
    { source = "LICENSE",                          dest = "/usr/share/licenses/magic-mesh/LICENSE", mode = "644" },
    { source = "NOTICE",                           dest = "/usr/share/licenses/magic-mesh/NOTICE",  mode = "644" },
    # EFF-17 — the upgrade path: the dnf repo definition + the committed
    # public signing key (Fedora convention location), so a one-shot
    # `dnf install <url>` leaves a working `dnf upgrade` channel with
    # gpgcheck on. Signing itself stays operator-gated at /release.
    { source = "packaging/repo/magic-mesh.repo",         dest = "/etc/yum.repos.d/magic-mesh.repo",          mode = "644" },
    { source = "packaging/repo/RPM-GPG-KEY-magic-mesh",  dest = "/etc/pki/rpm-gpg/RPM-GPG-KEY-magic-mesh",   mode = "644" },
    { source = "SUPPORT.md",                       dest = "/usr/share/magic-mesh/SUPPORT.md", mode = "644" },
    # EFF-27 — the operator day-2 guide ships beside SUPPORT.
    { source = "ADMIN.md",                         dest = "/usr/share/magic-mesh/ADMIN.md", mode = "644" },
    # ENT-12 — operator help docs; the Workbench Help panel + `mackesd
    # state-restore` reference these at /usr/share/mde/help/.
    { source = "docs/help/*.md",                   dest = "/usr/share/mde/help/", mode = "644" },
    # BRAND epic — Carbon system-wide branding, applied one-way on first boot of
    # a Workstation-role node by magic-mesh-brand.service (operator lock 2026-06-16).
    { source = "install-helpers/magic-mesh-brand.sh", dest = "/usr/libexec/mackesd/magic-mesh-brand", mode = "755" },
    { source = "packaging/systemd/magic-mesh-brand.service", dest = "/usr/lib/systemd/system/magic-mesh-brand.service", mode = "644" },
    { source = "assets/brand/mackes-carbon-icons.zip", dest = "/usr/share/magic-mesh/brand/mackes-carbon-icons.zip", mode = "644" },
    { source = "assets/brand/cosmic-layout/**/*",  dest = "/usr/share/magic-mesh/brand/cosmic-layout/", mode = "644" },
    { source = "assets/brand/monogram.png",        dest = "/usr/share/magic-mesh/brand/monogram.png",   mode = "644" },
    { source = "assets/brand/greeter-hero.png",    dest = "/usr/share/magic-mesh/brand/greeter-hero.png", mode = "644" },
    # MESHSHELL SHELL-1 — the mesh-status snapshot data plane (all roles).
    { source = "install-helpers/mesh-status-snapshot.sh", dest = "/usr/libexec/mackesd/mesh-status-snapshot", mode = "755" },
    { source = "packaging/systemd/mesh-status.service", dest = "/usr/lib/systemd/system/mesh-status.service", mode = "644" },
    { source = "packaging/systemd/mesh-status.timer",   dest = "/usr/lib/systemd/system/mesh-status.timer",   mode = "644" },
    # MESHSHELL SHELL-2 — Carbon starship prompt (the mesh node-list module +
    # config + profile.d hook; the hook no-ops until starship is installed).
    { source = "install-helpers/mesh-prompt-nodes.sh", dest = "/usr/libexec/mackesd/mesh-prompt-nodes", mode = "755" },
    { source = "packaging/starship/starship.toml",     dest = "/etc/starship.toml",                       mode = "644" },
    { source = "packaging/profile.d/zz-mde-starship.sh", dest = "/etc/profile.d/zz-mde-starship.sh",      mode = "644" },
    { source = "install-helpers/mesh-install-starship.sh", dest = "/usr/libexec/mackesd/mesh-install-starship", mode = "755" },
    { source = "packaging/systemd/mesh-shell-setup.service", dest = "/usr/lib/systemd/system/mesh-shell-setup.service", mode = "644" },
    # MESHSHELL SHELL-3 — the per-shell Carbon welcome greeting.
    { source = "install-helpers/mesh-welcome.py",       dest = "/usr/libexec/mackesd/mesh-welcome",        mode = "755" },
    { source = "packaging/profile.d/zz-mde-welcome.sh", dest = "/etc/profile.d/zz-mde-welcome.sh",         mode = "644" },
    # MESHSHELL SHELL-4 — the `mesh-help` cheat sheet (user-facing on PATH).
    { source = "install-helpers/mesh-help.sh",          dest = "/usr/bin/mesh-help",                       mode = "755" },
    # SETUP-6 — first-run console wizard unit + the unconfigured-node MOTD hint.
    { source = "packaging/systemd/magic-setup.service", dest = "/usr/lib/systemd/system/magic-setup.service", mode = "644" },
    { source = "packaging/profile.d/zz-mde-setup-motd.sh", dest = "/etc/profile.d/zz-mde-setup-motd.sh",   mode = "644" },
    # SETUP-7 — the hybrid-Ansible convergence role (re-applied by `mackesd
    # converge` against the generated /etc/mackesd/site.yml).
    { source = "ansible/ansible.cfg",              dest = "/usr/share/mackes/ansible/ansible.cfg",      mode = "644" },
    { source = "ansible/roles/mackes/**/*",        dest = "/usr/share/mackes/ansible/roles/mackes/",    mode = "644" },
    # BUS cross-node notifications — the ntfy broker template (was never shipped,
    # so the broker skipped 'TemplateMissing') + the first-boot ntfy fetch
    # (ntfy isn't in the Fedora repos, so it can't be a hard Require). All roles.
    { source = "data/ntfy/server.yml.tmpl",             dest = "/usr/share/mde/ntfy/server.yml.tmpl",      mode = "644" },
    { source = "install-helpers/mesh-install-ntfy.sh",  dest = "/usr/libexec/mackesd/mesh-install-ntfy",   mode = "755" },
    { source = "packaging/systemd/mesh-broker-setup.service", dest = "/usr/lib/systemd/system/mesh-broker-setup.service", mode = "644" },
    # NETDATA-1 — the live-metrics agent fetch installer + its first-boot unit
    # (netdata isn't in the Fedora repos; fetch-only birthright, ~181 MB).
    { source = "install-helpers/mesh-install-netdata.sh", dest = "/usr/libexec/mackesd/mesh-install-netdata", mode = "755" },
    { source = "packaging/systemd/mesh-netdata-setup.service", dest = "/usr/lib/systemd/system/mesh-netdata-setup.service", mode = "644" },
    # BIRTHRIGHT-2 — bundled air-gapped first-boot blobs. The mesh-install-*
    # helpers prefer these over a network fetch, so an offline install still
    # provisions ntfy + starship. NOT in git — fetched + sha256-verified at
    # build time by install-helpers/vendor-birthright-blobs.sh (which
    # build-rpm-fedora43.sh runs before generate-rpm). lizardfs stays fetch-only
    # under BIRTHRIGHT-1 (see docs/design/birthrights.md).
    { source = "vendor/birthright/ntfy_2.24.0_linux_amd64.tar.gz", dest = "/usr/share/magic-mesh/vendor/ntfy_2.24.0_linux_amd64.tar.gz", mode = "644" },
    { source = "vendor/birthright/starship-x86_64-unknown-linux-musl.tar.gz", dest = "/usr/share/magic-mesh/vendor/starship-x86_64-unknown-linux-musl.tar.gz", mode = "644" },
    # BIRTHRIGHT-1 — the role-aware LizardFS installer + the bundled fc43 RPM
    # family (the §1 shared-state substrate). LizardFS isn't in F44 base repos;
    # the fc43 binaries run on F44 via `rpm --nodeps`. setup-qnm-shared (already
    # shipped above) is auto-invoked by `mackesd found`/`join`. RPMs are NOT in
    # git — staged at build time by install-helpers/vendor-lizardfs-rpms.sh
    # (build-rpm-fedora43.sh runs it before generate-rpm).
    { source = "install-helpers/mesh-install-lizardfs.sh", dest = "/usr/libexec/mackesd/mesh-install-lizardfs", mode = "755" },
    { source = "vendor/birthright/lizardfs/*.rpm", dest = "/usr/share/magic-mesh/vendor/lizardfs/", mode = "644" },
    # SELINUX-1 — the local SELinux policy modules + their installer, so a node
    # runs clean under Enforcing (no AVC flood / repeating "SELinux security
    # alert" toasts). CIL is toolchain-free (`semodule -i`) and version-portable;
    # split by precondition so a missing optional type only skips that module.
    { source = "install-helpers/selinux/*.cil", dest = "/usr/share/magic-mesh/selinux/", mode = "644" },
    { source = "install-helpers/setup-selinux-policy.sh", dest = "/usr/libexec/mackesd/setup-selinux-policy", mode = "755" },
]
# EFF-14 — install/upgrade/remove scriptlets: register the daemon unit, create
# the config dir, refresh icon/desktop caches; clean up on removal. Guards keep
# them no-fatal in minimal/container roots.
post_install_script = """
systemctl daemon-reload >/dev/null 2>&1 || :
# Service manager (ONBOARD-9): the daemon, the overlay, and the health
# watchdog all start at boot. nebula.service ships disabled by the stock
# `nebula` RPM — enable it so the overlay is boot-durable independently of
# the mackesd supervisor. (mackesd self-gates on a pinned role, so enabling
# it pre-enrollment is safe — it idles until `found`/`join` pins a role.)
systemctl enable mackesd.service nebula.service mesh-health.timer >/dev/null 2>&1 || :
# BRAND — arm the one-way Carbon branding for first boot. The unit self-gates on
# Workstation role (ExecCondition) + a run-once stamp, so enabling it everywhere
# is safe: Server/Lighthouse skip it.
systemctl enable magic-mesh-brand.service >/dev/null 2>&1 || :
# MESHSHELL — the mesh-status snapshot timer feeds the bash prompt + greeting
# on every role.
systemctl enable --now mesh-status.timer >/dev/null 2>&1 || :
# MESHSHELL — fetch the starship prompt binary on first boot (checksum-verified;
# self-skips once /usr/bin/starship exists). All roles.
systemctl enable mesh-shell-setup.service >/dev/null 2>&1 || :
# BUS — fetch the ntfy cross-node notification broker on first boot (not in the
# Fedora repos; self-skips once /usr/bin/ntfy exists). All roles → mesh-wide
# notification distribution.
systemctl enable mesh-broker-setup.service >/dev/null 2>&1 || :
# NETDATA-1 — fetch the netdata live-metrics agent on first boot (not in the
# Fedora repos; self-skips once /opt/netdata/bin/netdata exists). All roles →
# the PD-7 flow map + peer health tiers get live data. The aggregator confines
# the dashboard to loopback + overlay.
systemctl enable mesh-netdata-setup.service >/dev/null 2>&1 || :
# SETUP-6 — first-run console wizard. Self-gates on an unconfigured node
# (ConditionPathExists=!/var/lib/mde/role.toml) + takes tty1 only, so enabling
# it everywhere is safe: a configured node skips it and getty owns tty1.
systemctl enable magic-setup.service >/dev/null 2>&1 || :
# SELINUX-1 — load the local SELinux policy module so the node runs clean under
# Enforcing (no AVC flood from mackesd's podman transition / libvirt /proc scans;
# no repeating "SELinux security alert" toasts). Self-skips if SELinux is off.
/usr/libexec/mackesd/setup-selinux-policy >/dev/null 2>&1 || :
# MUSIC-DAEMON-AUTOSTART — enable the mde-musicd USER service for every user so
# the music library has its action/music/* responder in the desktop session
# (the GUI talks to it over the bus). It self-gates on Workstation rank
# (ExecCondition) + only starts where a user session exists, so enabling it
# globally is safe: a headless Server/Lighthouse has no session to start it in.
systemctl --global enable mde-musicd.service >/dev/null 2>&1 || :
# SETUP-fix — materialize the shared bus dir now (no reboot needed).
systemd-tmpfiles --create /usr/lib/tmpfiles.d/magic-mesh.conf >/dev/null 2>&1 || :
[ -d /etc/mackesd ] || install -d -m 0700 /etc/mackesd
gtk-update-icon-cache -q -f /usr/share/icons/hicolor >/dev/null 2>&1 || :
update-desktop-database -q >/dev/null 2>&1 || :
"""
pre_uninstall_script = """
if [ "$1" = 0 ]; then
  systemctl --no-reload disable --now mackesd.service mesh-health.timer >/dev/null 2>&1 || :
fi
"""
post_uninstall_script = """
systemctl daemon-reload >/dev/null 2>&1 || :
# SELINUX-1 — drop the local policy modules on a full removal (not an upgrade).
if [ "$1" = 0 ]; then
  semodule -r magicmesh-base magicmesh-podman magicmesh-libvirt >/dev/null 2>&1 || :
fi
"""

# Runtime deps the platform shells to (D-W1 / §1-§5 substrate).
# EFF-42 — verified: `nebula` IS packaged in stock Fedora (1.10.3 on
# F44), so the hard Requires resolves without our repo.
[package.metadata.generate-rpm.requires]
nebula = "*"
# SUBAUDIT-C1 (2026-06-14) — the network-probe inventory ("Discovered Hosts")
# shells `nmap`; absent, the probe silently writes an empty inventory and the
# panel shows 0 hosts. Hard Require: nmap is small + in the base Fedora repos,
# and the feature is core to the mesh host map.
nmap = "*"
# REL-2 (2026-06-16) — the binaries link libasound.so.2 (the AIR-5 audio chain
# in mde-musicd/mde-voice-hud), so it's an implicit ELF dep. Declare it: a
# headless lighthouse without alsa-lib failed the v10.0.9 install until it was
# added by hand. alsa-lib is small + in the base Fedora repos.
alsa-lib = "*"
# XPA-9 (2026-06-17) — the bundled fc43 lizardfs-client's `mfsmount` links
# libfuse.so.2 (FUSE 2). Fedora 44 ships only FUSE 3 by default, so a fresh
# node failed `mfsmount: error while loading shared libraries: libfuse.so.2`
# → QNM-Shared could NEVER mount → the Server never joined the directory
# (found bringing up MDE-VM-1..4 on XCP). Hard Require the FUSE 2 runtime +
# its mount helper (both small, base Fedora repos).
fuse-libs = "*"
fuse = "*"

# EFF-42 — ansible-core is a WEAK dep (Recommends): only the Server-tier
# ansible_pull/job_exec workers shell to it, and they degrade gracefully
# (spawn failure → recoverable error + back-off) when it's absent. A
# Lighthouse VPS or a desktop-only Workstation shouldn't drag in the
# whole ansible stack; `dnf install` still pulls it by default
# (weak deps on), and `--setopt=install_weak_deps=False` opts out.
[package.metadata.generate-rpm.recommends]
ansible-core = "*"
# AUD6-6 — the shipped (disabled, operator-enabled per EFF-43)
# kamailio-mde/rtpengine-mde units ExecStart these external binaries;
# without them `systemctl start kamailio-mde` fails silently. Weak deps
# so a default install carries them, opt-out-able like ansible-core.
kamailio = "*"
rtpengine = "*"
# AUD6-14 — the kickstart enables libvirtd; back it with a weak dep so
# a bare-Fedora spin actually has the daemon the services line names.
libvirt-daemon-driver-qemu = "*"
libvirt-daemon-config-network = "*"
# AUD7-8 (NET-INTROSPECT) — the relay/direct path classifier shells `ssh-keygen`
# (debug-SSH keys) + `ssh` (the loopback `list-hostmap -json` query). Without
# openssh-clients the feature silently degrades to "overlay" (no crash); a weak
# dep so a default install gets real classification, opt-out-able.
openssh-clients = "*"
# SUBAUDIT-C1 (2026-06-14) — workers shell these helpers; absent, the owning
# panel silently degrades to empty. Weak deps so a default install carries them
# (opt-out-able), matching the ansible-core pattern: NetworkManager (Interfaces/
# Wi-Fi via nmcli), firewalld (Firewall via firewall-cmd), podman (Compute
# containers), rsync (mirror sync). systemd-resolved/resolvectl ship with
# systemd; lizardfs-client is installed out-of-band (not in F44 repos).
NetworkManager = "*"
firewalld = "*"
podman = "*"
rsync = "*"

# EFF-42 — upgrade continuity: the pre-pivot package name was `mde-core`
# (the E8-era RPM; see config/daemon.rs's template note). Obsolete it so
# a box carrying the old package upgrades cleanly into `magic-mesh`.
[package.metadata.generate-rpm.obsoletes]
mde-core = "*"
