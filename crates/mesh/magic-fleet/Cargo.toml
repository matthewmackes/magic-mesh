[package]
name        = "magic-fleet"
version     = "0.0.0"
edition     = "2021"
# EFF-16 — license metadata so cargo-deny's unlicensed gate passes.
license.workspace = true
publish     = false
description = "E11.7 — MCNF \"Automation Mesh\" node engine: apply a desired-state Ansible playbook to the local node via ansible-runner and report convergence (ok/changed/failures/unreachable). The peer-to-peer routing + fleet baseline layer build on this local-apply primitive."

[lints]
workspace = true

[[bin]]
name = "magic-fleet"
path = "src/main.rs"

[dev-dependencies]
tempfile = "3"

[dependencies]
# EFF-19 — real CLI parsing (--help/-h, typed flags, parity with
# meshctl) instead of the hand-rolled strip_prefix loops.
clap       = { version = "4.5", features = ["derive"] }
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
# Pure-Rust YAML; already in the workspace lockfile. (Maintained-fork swap to
# serde_yml is a noted follow-up; serde_yaml keeps the dep graph fetch-free.)
serde_yaml = "0.9"
