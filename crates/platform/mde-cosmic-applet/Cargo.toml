[package]
name = "mde-cosmic-applet"
version = "0.1.0"
edition = "2021"
# EFF-16 — license metadata so cargo-deny's unlicensed gate passes.
license.workspace = true
description = "Magic Mesh cosmic-applet: mesh health pip + quick actions over mde-bus, deep-linking into the Workbench (GUI-6/Q46-47). Render-agnostic logic layer (lib) + the libcosmic panel shell (bin)."

[lib]
path = "src/lib.rs"

# GUI-6 — the libcosmic panel shell. Thin glue over the lib; renders the
# pip + popover into the Cosmic panel. Pinned to the libcosmic rev the
# feasibility probe built clean against (cca48bc).
[[bin]]
name = "mde-cosmic-applet"
path = "src/bin/mde-cosmic-applet.rs"

# APPS-2 — the Applications Panel launcher applet (grid glyph + tabbed dropdown).
# Thin libcosmic shell over the lib's launcher model; renders the action/apps/list
# feed from the mackesd apps_aggregator (APPS-1).
[[bin]]
name = "mde-apps-applet"
path = "src/bin/mde-apps-applet.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
mde-bus = { path = "../mde-bus" }
# NOTIFY-7 / AC — the bell tints by the highest-severity unread alert tailed off
# the bus, and shares the severity→Carbon-token map with the Action Center.
mde-notify = { path = "../../services/mde-notify" }
mde-theme = { path = "../../shared/mde-theme" }
tokio = { version = "1", features = ["process", "rt"] }

[dependencies.libcosmic]
git = "https://github.com/pop-os/libcosmic.git"
rev = "cca48bc29ef7a9f22160c0ab6ba117ab22d1ae87"
default-features = false
# EFF-37 — a11y on: the panel applet exposes its tree via accesskit
# like the other libcosmic surfaces (mde-files, mde-role-chooser).
features = ["applet-token", "tokio", "wayland", "a11y"]

[dev-dependencies]
