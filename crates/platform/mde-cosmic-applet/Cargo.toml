[package]
name = "mde-cosmic-applet"
version = "0.1.0"
edition = "2021"
# EFF-16 — license metadata so cargo-deny's unlicensed gate passes.
license.workspace = true
description = "MCNF cosmic-applet: mesh health pip + quick actions over mde-bus, deep-linking into the Workbench (GUI-6/Q46-47). Render-agnostic logic layer (lib) + the libcosmic panel shell (bin)."

[lib]
path = "src/lib.rs"

# GUI-6 — the libcosmic panel shell. Thin glue over the lib; renders the
# pip + popover into the Cosmic panel. Pinned to the libcosmic rev the
# feasibility probe built clean against (cca48bc).
#
# APPLAUNCH-9 (2026-06-27): the `mde-apps-applet` launcher bin was RETIRED here —
# the app-launcher role folded into the Front Door (one launcher; the standalone
# applet is gone). This crate now ships ONLY the lighthouse-health applet; the
# launcher-only lib model (Entry/LauncherTab/WorkloadAction/filter_entries/…) was
# removed with it. The Front Door is the sole launcher.
[[bin]]
name = "mde-cosmic-applet"
path = "src/bin/mde-cosmic-applet.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
mde-bus = { path = "../mde-bus" }
# LIGHTHOUSE-7 — the canonical lighthouse `role` string (LIGHTHOUSE_ROLE) so the
# applet's snapshot-based lighthouse-health indicator can't silently diverge from
# the Workbench tab / mackesd. mackes-mesh-types is a shell-free mesh-side leaf
# crate (the §6 boundary lint only forbids deps into crates/shell/*), already a
# dep of the sibling mde-workbench.
mackes-mesh-types = { path = "../../mesh/mackes-mesh-types" }
# NOTIFY-7 / AC — the bell tints by the highest-severity unread alert tailed off
# the bus, and shares the severity→Carbon-token map with the Action Center.
mde-notify = { path = "../../services/mde-notify" }
# `serde` feature: the applet reads the user's theme preference
# (`Preferences::load`) so the panel indicator honors light + dark themes.
mde-theme = { path = "../../shared/mde-theme", features = ["serde"] }
# (APPLAUNCH-9: the `tokio` dep was dropped with the apps-applet — the
# lighthouse-health applet does no async process work.)

[dependencies.libcosmic]
git = "https://github.com/pop-os/libcosmic.git"
rev = "cca48bc29ef7a9f22160c0ab6ba117ab22d1ae87"
default-features = false
# EFF-37 — a11y on: the panel applet exposes its tree via accesskit
# like the other libcosmic surfaces (mde-files, mde-role-chooser).
features = ["applet-token", "tokio", "wayland", "a11y"]

[dev-dependencies]
