[package]
name = "mde-cosmic-applet"
version = "0.1.0"
edition = "2021"
# EFF-16 — license metadata so cargo-deny's unlicensed gate passes.
license.workspace = true
description = "MCNF cosmic-applet: mesh health pip + quick actions over mde-bus, deep-linking into the Workbench (GUI-6/Q46-47). Render-agnostic logic layer (lib) + the libcosmic panel shell (bin)."

[lib]
path = "src/lib.rs"

# E12-14b — the libcosmic panel-shell binary (`src/bin/mde-cosmic-applet.rs`) was
# stripped. The render-agnostic lib (the LIGHTHOUSE-7 mesh-health model) is reused
# by the egui replacements (`mde-panel-egui` + `mde-shell-egui`) WITHOUT compiling
# libcosmic, which E12 retires. The crate is now lib-only.
# (APPLAUNCH-9, 2026-06-27: the `mde-apps-applet` launcher bin was already retired
# here — the app-launcher role folded into the Front Door, one launcher.)
[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
mde-bus = { path = "../mde-bus" }
# LIGHTHOUSE-7 — the canonical lighthouse `role` string (LIGHTHOUSE_ROLE) so the
# applet's snapshot-based lighthouse-health indicator can't silently diverge from
# the Workbench tab / mackesd. mackes-mesh-types is a shell-free mesh-side leaf
# crate (the §6 boundary lint only forbids deps into crates/shell/*), shared
# with the other GUI surfaces.
mackes-mesh-types = { path = "../../mesh/mackes-mesh-types" }

[dev-dependencies]
