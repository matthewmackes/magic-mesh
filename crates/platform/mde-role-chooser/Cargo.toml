[package]
name = "mde-role-chooser"
version = "0.1.0"
edition = "2021"
# EFF-16 — license metadata so cargo-deny's unlicensed gate passes.
license.workspace = true
description = "MCNF first-run deployment-role chooser (E12-8): an egui client that pins Lighthouse / XCP-NG / Workstation at install via `mackesd role-pin`. Self-exits when a role is already pinned, so it can run as a first-boot autostart."

[[bin]]
name = "mde-role-chooser"
path = "src/main.rs"

[dependencies]
mde-role = { path = "../mde-role" }
# E12-8: the shared egui harness (run_client + Style) replaces libcosmic.
mde-egui = { path = "../../shared/mde-egui" }
# Renders the single-source project DISCLAIMER / mission (embedded from the
# repo-root DISCLAIMER.md), shared with the installer + daemon banner.
mde-disclaimer = { path = "../../shared/mde-disclaimer" }
