[package]
name = "mde-role-chooser"
version = "0.1.0"
edition = "2021"
# EFF-16 — license metadata so cargo-deny's unlicensed gate passes.
license.workspace = true
description = "MCNF first-run onboarding entry (ONBOARD-WIZARD OW-1): an egui gate — disclaimer ack, pick Lighthouse / Workstation, pick create-vs-join — that pins the role via `mackesd role-pin` and records the intent (~/.config/mde/onboard.json) for the wizard. Self-exits when a role is already pinned, so it can run as a first-boot autostart."

[[bin]]
name = "mde-role-chooser"
path = "src/main.rs"

[dependencies]
mde-role = { path = "../mde-role" }
# E12-8: the shared egui harness (run_client + Style) replaces the Cosmic-era toolkit.
# arch-4 / §6 layered-tiers: this crate is filed under crates/platform/ but is a
# genuine GUI surface (the OW-1 onboarding chooser, an eframe::App with no headless
# path), so this one platform→gui edge is a CURATED exception in
# install-helpers/lint-layered-tiers.sh (is_excepted_edge). Any other platform /
# substrate crate reaching mde-egui is still a gate failure.
mde-egui = { path = "../../shared/mde-egui" }
# Renders the single-source project DISCLAIMER / mission (embedded from the
# repo-root DISCLAIMER.md), shared with the installer + daemon banner.
mde-disclaimer = { path = "../../shared/mde-disclaimer" }
