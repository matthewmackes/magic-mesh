[package]
name        = "mde-voice-config"
description = "Pure-function generator for kamailio-mde + rtpengine-mde configuration (VV-1/VV-1.5/VV-2)."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
insta       = { version = "1", features = ["json"] }
serde_json  = "1"

[lints]
workspace = true
