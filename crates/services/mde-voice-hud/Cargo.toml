[package]
name        = "mde-voice-hud"
description = "Iced + wlr-layer-shell PJSIP softphone HUD — VOIP-27..VOIP-30 per docs/design/v6.0-pjsip-presence-and-hud.md."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

# E12-14b — the Cosmic-era wlr-layer-shell HUD binary was stripped; this crate
# is now purely the render-agnostic SIP core (sip/media/roster/resolve — no
# GUI toolkit) as a library. `mde-voice-egui` reuses the register/call state
# machine + the persistent SIP agent on the egui harness
# (`default-features = false`), rendered as the Voice panel in `mde-shell-egui`.
[lib]
name = "mde_voice_hud"
path = "src/lib.rs"

[dependencies]
# Single-source the QNM-Shared mount resolution (default_workgroup_root)
# shared with mackesd + the workbench, so the VOIP roster reads the same
# mount the daemon writes (not the phantom /mnt/mesh-storage).
mackes-mesh-types = { path = "../../mesh/mackes-mesh-types" }

# Fixture + activity-feed parsing.
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
toml       = "0.8"

# tracing — the SIP core's structured logs (register/call/media/roster).
tracing            = "0.1"

# XDG home + cache paths.
dirs = "5"
rsip = "0.4"
tokio = { version = "1", default-features = false, features = ["rt"] }
cpal = "0.17"

# VOIP-GW-4 — secure SIP register over SIP/TLS (5061). Synchronous rustls
# client (ring provider + std) matching the workspace substrate lock (no
# OpenSSL linkage — deny.toml); the system trust store is loaded via
# rustls-native-certs, the same versions mackesd's https443 transport pins.
rustls              = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
rustls-native-certs = "0.8"

# VOIP-28 / E7.5 — publish the persistent SIP agent's registration + listener
# state to the Bus (`state/voice/status`) so the birthright commissioning
# dashboard (and any other reader) can attest the softphone is up cross-process.
mde-bus = { path = "../../platform/mde-bus" }

[lints]
workspace = true
