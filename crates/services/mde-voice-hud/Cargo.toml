[package]
name        = "mde-voice-hud"
description = "Iced + wlr-layer-shell PJSIP softphone HUD — VOIP-27..VOIP-30 per docs/design/v6.0-pjsip-presence-and-hud.md."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[[bin]]
name = "mde-voice-hud"
path = "src/main.rs"

[dependencies]
# CUT-2 (2026-06-13) — the HUD is a layer-shell Overlay surface; ported off
# crates.io iced + iced_layershell onto libcosmic's vendored iced fork (the
# EFF-35 rev) which ships native wlr-layer-shell. This evicts the last
# crates.io iced from the workspace (→ CUT-3 deny-flip).
libcosmic = { git = "https://github.com/pop-os/libcosmic.git", rev = "cca48bc29ef7a9f22160c0ab6ba117ab22d1ae87", default-features = false, features = ["tokio", "winit", "wgpu", "a11y", "wayland", "multi-window"] }

# §4 — the HUD's Carbon hex is single-sourced from the mde-theme ramp, not
# re-typed here. Default features only (no `iced`): we take the `Rgba` ramp
# constants and convert to this crate's `iced::Color` locally, sidestepping the
# cross-crate iced-version skew of `Rgba::into_iced_color()`.
mde-theme = { path = "../../shared/mde-theme" }
# Single-source the QNM-Shared mount resolution (default_workgroup_root)
# shared with mackesd + the workbench, so the VOIP roster reads the same
# mount the daemon writes (not the phantom /mnt/mesh-storage).
mackes-mesh-types = { path = "../../mesh/mackes-mesh-types" }

# Fixture + activity-feed parsing.
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
toml       = "0.8"

# CLI + tracing — same shape mde-popover uses.
clap               = { version = "4.5", features = ["derive"] }
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# XDG home + cache paths.
dirs = "5"
rsip = "0.4"
tokio = { version = "1", default-features = false, features = ["rt"] }
cpal = "0.17"

# VOIP-28 / E7.5 — publish the persistent SIP agent's registration + listener
# state to the Bus (`state/voice/status`) so the birthright commissioning
# dashboard (and any other reader) can attest the softphone is up cross-process.
mde-bus = { path = "../../platform/mde-bus" }

[lints]
workspace = true
