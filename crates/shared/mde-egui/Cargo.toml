[package]
name        = "mde-egui"
description = "MCNF E12 egui harness — the shared eframe runner (the bare DRM-seat path + the windowed-client fallback), the single-source Style/Visuals design system, and the motion (duration/easing) table that every E12 surface renders through. Replaces the retired Cosmic-era toolkit + Carbon-token theme stack."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[lib]
name = "mde_egui"
path = "src/lib.rs"

[features]
default = []
# E12-2: the bare-seat backend — egui rendered directly on a DRM/KMS seat with NO
# Wayland compositor. Pulls a heavy native stack (libdrm/GBM/EGL/GLES via egui_glow,
# libinput/udev for the seat), so it is OFF by default and enabled by the shell
# binary; dev/windowed builds use the default eframe (wgpu) runner.
drm = ["dep:drm", "dep:gbm", "dep:khronos-egl", "dep:glow", "dep:egui_glow", "dep:input", "dep:udev"]
accesskit = ["eframe/accesskit", "egui/accesskit"]

[dependencies]
# E12 §4: egui is THE toolkit. eframe = egui + winit + wgpu, built as a Wayland
# client — default-features off drops glow/x11/persistence; we opt into the wgpu
# renderer, the Wayland winit backend, and the bundled default fonts. AccessKit is
# enabled through this crate's `accesskit` feature; NOTIF-11 wires the first shell
# live-region consumer without forcing it onto headless/default builds.
eframe = { version = "0.31", default-features = false, features = ["wgpu", "wayland", "default_fonts"] }
egui   = "0.31"

# --- E12-2 bare-seat (DRM/KMS) backend — optional, enabled by `--features drm`.
# Native deps: libdrm, libgbm, libEGL/libGLESv2, libinput, libudev. Versions are
# pinned loosely; the farm build is the source of truth for resolution.
drm         = { version = "0.14", optional = true }
gbm         = { version = "0.18", optional = true, features = ["drm-support"] }
khronos-egl = { version = "6", optional = true, features = ["dynamic"] }
glow        = { version = "0.16", optional = true }
egui_glow   = { version = "0.31", optional = true }
input       = { version = "0.9", optional = true }
udev        = { version = "0.9", optional = true }

[[example]]
name = "hello"
path = "examples/hello.rs"

# E12-2 bare-seat (DRM) acceptance surface — only built when the `drm` feature is on.
[[example]]
name = "hello_drm"
path = "examples/hello_drm.rs"
required-features = ["drm"]

# MEDIA-2 overlay video-plane acceptance surface — enumerates real DRM planes and
# resolves the overlay-vs-render-to-texture decision; only built with the `drm` feature.
[[example]]
name = "hello_video_plane"
path = "examples/hello_video_plane.rs"
required-features = ["drm"]

# QC-23 Tier 1 PRIME-import liveness acceptance surface — round-trips a locally
# GBM-allocated buffer through buffer_to_prime_fd/prime_fd_to_buffer/
# add_planar_framebuffer with no QEMU involved; only built with the `drm` feature.
[[example]]
name = "hello_prime_import"
path = "examples/hello_prime_import.rs"
required-features = ["drm"]

# E12-2: this crate carries the bare-seat FFI backend (DRM/GBM/EGL/GL/libinput),
# which inherently needs `unsafe`. The workspace FORBIDS unsafe; mirror the workspace
# lints here but DENY (overridable) rather than forbid it, so the FFI `drm` module can
# opt in per-module with a documented reason while the rest of the crate stays clean.
[lints.rust]
unsafe_code     = "deny"
missing_docs    = "warn"
unused_must_use = "deny"

[lints.clippy]
pedantic    = { level = "warn", priority = -1 }
nursery     = { level = "warn", priority = -1 }
unwrap_used = "deny"
panic       = "warn"
todo        = "deny"
