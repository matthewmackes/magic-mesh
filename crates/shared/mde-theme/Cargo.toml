[package]
name        = "mde-theme"
description = "MCNF Quazar branding + build-identity — the single source of truth for the platform's version line, codename and (QBRAND) build stamp that every egui surface, the RPM and `--version` read from. Toolkit-free so the shell About, the daemon `--version` and packaging share one canonical copy without a GUI dependency."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[lib]
name = "mde_theme"
path = "src/lib.rs"

# QBRAND-1 — `build.rs` stamps the build identity (version · git short-hash ·
# UTC date · channel) into the crate at compile time via `cargo:rustc-env`; the
# `brand::build` module reads it back with `env!`. No build-dependencies: the
# script is std-only (git via `std::process::Command`, date via a civil-calendar
# routine) so it builds on the airgapped farm with no extra crates.

[dependencies]
# QBRAND-2 — SVG→raster for the brand icon set (`brand::icons`). `resvg` (which
# re-exports its `usvg` parser + `tiny-skia` rasterizer) is pure Rust, so it
# vendors cleanly on the airgapped farm. default-features OFF drops the
# text/fontdb stack + raster-image decoding: the 19 Quazar glyphs are pure
# `currentColor` line-art paths, and the wordmark's <text> logotype is
# deliberately skipped until it is outlined (see the `brand::icons` docs).
# Note: this keeps the crate toolkit-free — the loader returns plain RGBA8, no
# egui dependency; the shell wraps the buffer into a texture.
resvg = { version = "0.45", default-features = false }

[lints]
workspace = true
