[package]
name        = "mde-theme"
description = "MDE design system — palette, typography, spacing, radii, shadows, density, theme. Tokens locked via the 50-Q + FU + NFU survey (2026-05-21). See docs/design/visual-identity.md."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true

[lib]
name = "mde_theme"
path = "src/lib.rs"

[features]
default = []
# CUT-3 (2026-06-13): the `iced` interop feature (+ its crates.io iced_core
# optional dep) was removed — the GUI is all-libcosmic now and converts Rgba to
# the fork's Color locally, so the crate again has no GUI-toolkit dep. Keeping
# the optional crates.io iced_core was the last pin holding crates.io iced in
# the workspace lock.
# Enable serde Serialize/Deserialize on Theme / Density / A11y /
# Preferences for TOML persistence to ~/.config/mde/preferences.toml.
serde = ["dep:serde", "dep:toml"]

[dependencies]
serde     = { version = "1", features = ["derive"], optional = true }
toml      = { version = "0.8", default-features = false, features = ["parse", "display"], optional = true }

[dev-dependencies]
# Reserved for future gallery (UX-13) — no dev deps today.

[lints]
workspace = true
